# =========================
# 📌 CONFIGURACIÓN GENERAL
# =========================
server.port=8082
spring.application.name=clientes-service

# =========================
# 💾 BASE DE DATOS SQL SERVER (dev remoto)
# =========================
spring.datasource.url=jdbc:sqlserver://187.77.60.183:1433;databaseName=sgo_clientes_test;encrypt=false;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:SgoAdmin2024!}

# =========================
# ⚙️ JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# =========================
# FLYWAY
# =========================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.repair-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.ignore-migration-patterns=*:missing

services.obras.url=http://localhost:8081/api/obras
services.transacciones.url=http://localhost:8086/api/transacciones

# =========================
# 📥 SQL INIT (si tenés data.sql)
# =========================
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:data-dev.sql
spring.sql.init.continue-on-error=true
spring.sql.init.encoding=UTF-8
spring.jpa.defer-datasource-initialization=false

# Flyway no aplica en dev (SQLite)
spring.flyway.enabled=false

