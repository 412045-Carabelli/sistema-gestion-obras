# MODO DESARROLLO LOCAL
# ============================

server.port=8089
spring.application.name=auth-service

# Database (localhost para IDE)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=sgo_auth;encrypt=false
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:SgoAdmin2024!}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:your-super-secret-key-min-32-chars-long-for-hs256-algorithm}
jwt.accessTokenExpiration=900
jwt.refreshTokenExpiration=2592000

# Logging
logging.level.root=INFO
logging.level.com.auth=DEBUG

# Error detail
server.error.include-message=always
server.error.include-binding-errors=always
