spring.application.name=auth-service
server.port=8089

# Database
spring.datasource.url=jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=sgo_auth;encrypt=false;trustServerCertificate=true
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:SgoAdmin2024!}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:your-super-secret-key-min-32-chars-long-for-hs256-algorithm}
jwt.accessTokenExpiration=900
jwt.refreshTokenExpiration=2592000

# Push notifications
push.internal.secret=${PUSH_INTERNAL_SECRET:sgo-internal-push-secret-2026}

# VAPID (Web Push)
vapid.public.key=${VAPID_PUBLIC_KEY:BElyDmJ9s0A6s-1lh2EDvrkxQD8xXYYU0zIYWgvh-HuCJV6ssGPCd6LF37C_UO1XtDR0ETeM3JVlcXy19inen4o}
vapid.private.key=${VAPID_PRIVATE_KEY:-rqkiqdFYHxPuDrdoLmMV3oI_0WJVUqxLCx3-egi7HU}
vapid.subject=${VAPID_SUBJECT:mailto:admin@buildrr.cloud}

# Logging
logging.level.root=INFO
logging.level.com.auth=DEBUG

# Actuator (opcional)
management.endpoints.web.exposure.include=health,info
