# =========================
# CONFIGURACION GENERAL
# =========================
server.port=8086
spring.application.name=transacciones-service

# =========================
# BASE DE DATOS SQL SERVER (local por defecto)
# =========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=sgo_dev;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:YourStrong!Passw0rd}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.springframework.jdbc.datasource.init=DEBUG
spring.jpa.properties.hibernate.default_schema=transacciones

# =========================
# SQL INIT (carga data.sql al iniciar)
# =========================
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true
spring.sql.init.encoding=UTF-8
spring.jpa.defer-datasource-initialization=true
app.migration.schema=transacciones

# =========================
# CONFIGURACION DE ARCHIVOS (modo dev)
# =========================
file.upload-dir=uploads-dev/

# =========================
# SERVICIOS EXTERNOS
# =========================
services.obras.url=http://localhost:8081/api/v1/obras\n\n# ============================\n# ? ACTUATOR\n# ============================\nmanagement.endpoints.web.exposure.include=health,info,prometheus\nmanagement.endpoint.health.show-details=always\n
