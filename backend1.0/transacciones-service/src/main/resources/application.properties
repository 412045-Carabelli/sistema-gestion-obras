# =========================
# CONFIGURACION GENERAL
# =========================
server.port=8086
spring.application.name=transacciones-service

# =========================
# BASE DE DATOS SQL SERVER
# =========================
spring.datasource.url=jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=sgo_transacciones;encrypt=false;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:SgoAdmin2024!}

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# =========================
# FLYWAY
# =========================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validateOnMigrate=false
spring.flyway.outOfOrder=true

# =========================
# SQL INIT (Flyway gestiona el schema)
# =========================
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# =========================
# CONFIGURACION DE ARCHIVOS
# =========================
file.upload-dir=uploads-dev/

# =========================
# SERVICIOS EXTERNOS
# =========================
services.obras.url=http://localhost:8081/api/obras
