# =========================
# CONFIGURACION GENERAL
# =========================
server.port=8086
spring.application.name=transacciones-service

# =========================
# BASE DE DATOS SQL SERVER (dev remoto)
# =========================
spring.datasource.url=jdbc:sqlserver://187.77.60.183:1433;databaseName=sgo_transacciones_test;encrypt=false;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:SgoAdmin2024!}

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.springframework.jdbc.datasource.init=DEBUG

# =========================
# FLYWAY
# =========================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.repair-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.ignore-migration-patterns=*:missing

# =========================
# SQL INIT (activo)
# =========================
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:data-dev.sql
spring.sql.init.continue-on-error=true
spring.sql.init.encoding=UTF-8
spring.jpa.defer-datasource-initialization=false

# =========================
# CONFIGURACION DE ARCHIVOS (modo dev)
# =========================
file.upload-dir=uploads-dev/

# =========================
# SERVICIOS EXTERNOS
# =========================
services.obras.url=http://localhost:8081/api/obras
