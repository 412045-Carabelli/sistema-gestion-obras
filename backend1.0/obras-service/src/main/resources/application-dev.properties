# =========================
# CONFIGURACION GENERAL
# =========================
server.port=8081
spring.application.name=obras-service

# =========================
# BASE DE DATOS SQL SERVER (local)
# =========================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=sgo_obras;encrypt=false;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=SgoAdmin2024!

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# =========================
# FLYWAY
# =========================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=true
spring.flyway.ignore-migration-patterns=*:missing
spring.flyway.validate-on-migrate=false
spring.flyway.repair-on-migrate=true

# =========================
# SQL INIT
# =========================
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# =========================
# LOGGING DETALLADO
# =========================
logging.level.org.springframework.jdbc.datasource.init=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# =========================
# ERROR HANDLING
# =========================
server.error.include-message=always
server.error.include-binding-errors=always
