# Production profile: keep schema/data and skip test seeds
server.port=8081
spring.application.name=obras-service

# Database settings are inherited from application.properties to use SQL Server
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true

# Disable data.sql on startup for prod
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Error handling
server.error.include-message=always
server.error.include-binding-errors=always
