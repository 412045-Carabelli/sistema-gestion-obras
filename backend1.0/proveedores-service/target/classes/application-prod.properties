# Production profile: preserve data and avoid reseeding
server.port=8083
spring.application.name=proveedores-service

# Database settings are inherited from application.properties to use SQL Server
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true

# Disable data.sql loading in prod
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

obras.service.url=http://obras-service:8081
transacciones.service.url=http://transacciones-service:8086/api/transacciones
