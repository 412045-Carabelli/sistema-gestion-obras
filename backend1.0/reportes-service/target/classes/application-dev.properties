# =========================
# CONFIGURACION GENERAL
# =========================
server.port=8084
spring.application.name=reportes-service

# =========================
# BASE DE DATOS SQL SERVER (VPS dev)
# =========================
spring.datasource.url=jdbc:sqlserver://187.77.60.183:1433;databaseName=sgo_reportes_test;encrypt=false;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=SgoAdmin2024!

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# =========================
# FLYWAY
# =========================
# Flyway estaba deshabilitado en dev; V1 (CREATE TABLE) y V3 (CREATE PROCEDURE, sin
# OR ALTER) ya existen en sgo_reportes_test (creados a mano o por Hibernate
# ddl-auto=update). Baseline en 3 evita que Flyway intente recrearlos y falle;
# solo corre V4 en adelante (nuevas, todas CREATE OR ALTER).
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=3
spring.flyway.validate-on-migrate=false
spring.flyway.repair-on-migrate=true
spring.flyway.locations=classpath:db/migration

# =========================
# SQL INIT
# =========================
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# =========================
# LOGGING
# =========================
logging.level.org.springframework.jdbc.datasource.init=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# =========================
# URLS A OTROS SERVICIOS
# =========================
servicios.obras.base-url=http://localhost:8081
servicios.clientes.base-url=http://localhost:8082
servicios.proveedores.base-url=http://localhost:8083
servicios.transacciones.base-url=http://localhost:8086

# =========================
# CROSS-DATABASE (SPs de transacciones-service via EXEC)
# =========================
db.schema.obras=sgo_obras_test
db.schema.clientes=sgo_clientes_test
db.schema.proveedores=sgo_proveedores_test
db.schema.transacciones=sgo_transacciones_test
