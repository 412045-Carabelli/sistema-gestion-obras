# =========================
# CONFIGURACION GENERAL
# =========================
server.port=8084
spring.application.name=reportes-service

# =========================
# BASE DE DATOS SQL SERVER (VPS dev)
# =========================
spring.datasource.url=jdbc:sqlserver://187.77.60.183:1433;databaseName=sgo_reportes_test;encrypt=false;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=SgoAdmin2024!

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# =========================
# FLYWAY
# =========================
spring.flyway.enabled=false

# =========================
# SQL INIT
# =========================
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# =========================
# LOGGING
# =========================
logging.level.org.springframework.jdbc.datasource.init=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# =========================
# URLS A OTROS SERVICIOS
# =========================
servicios.obras.base-url=http://localhost:8081
servicios.clientes.base-url=http://localhost:8082
servicios.proveedores.base-url=http://localhost:8083
servicios.transacciones.base-url=http://localhost:8086
