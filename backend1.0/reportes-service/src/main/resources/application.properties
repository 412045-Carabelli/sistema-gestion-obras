# =========================
# ðŸš€ CONFIGURACIÃ“N GENERAL
# =========================
server.port=8084
spring.application.name=reportes-service

# =========================
# BASE DE DATOS SQL SERVER (local por defecto)
# =========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=sgo_dev;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:YourStrong!Passw0rd}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =========================
# ðŸ§¬ JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=reportes

# =========================
# ðŸ’¤ SQL INIT (desactivado)
# =========================
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# =========================
# ðŸ“ LOGGING
# =========================
logging.level.org.springframework.jdbc.datasource.init=INFO
logging.level.org.hibernate.SQL=INFO
app.migration.schema=reportes

# =========================
# ðŸŒ SERVICIOS EXTERNOS
# =========================
servicios.obras.base-url=http://localhost:8081
servicios.clientes.base-url=http://localhost:8082
servicios.proveedores.base-url=http://localhost:8083
servicios.transacciones.base-url=http://localhost:8086\n\n# ============================\n# ? ACTUATOR\n# ============================\nmanagement.endpoints.web.exposure.include=health,info,prometheus\nmanagement.endpoint.health.show-details=always\n
