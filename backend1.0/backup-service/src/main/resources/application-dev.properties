spring.config.import=optional:file:.env[.properties]
server.port=8088
spring.application.name=backup-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=sgo_dev;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Sistema_obras_2026!}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=backups

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-backups.sql
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=false

backup.storage.root-dir=${BACKUP_STORAGE_ROOT_DIR:data/backups}
backup.storage.environment=dev
backup.documents.root-dir=${BACKUP_DOCUMENTS_ROOT_DIR:uploads-dev}
backup.documents.minio.enabled=${BACKUP_DOCUMENTS_MINIO_ENABLED:true}
backup.documents.minio.url=${BACKUP_DOCUMENTS_MINIO_URL:http://localhost:9000}
backup.documents.minio.access-key=${BACKUP_DOCUMENTS_MINIO_ACCESS_KEY:minioadmin}
backup.documents.minio.secret-key=${BACKUP_DOCUMENTS_MINIO_SECRET_KEY:minioadmin}
backup.documents.minio.bucket=${BACKUP_DOCUMENTS_MINIO_BUCKET:documentos}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
