# ============================
# ? CONFIGURACIÓN BASE
# ============================
server.port=8080
spring.application.name=api-gateway
spring.main.web-application-type=reactive

# ? Perfil activo por defecto (cuando se ejecuta desde IDE)
spring.profiles.active=dev

# ============================
# ? WEBCLIENT (DEFAULTS)
# ============================
app.webclient.connect-timeout-ms=5000
app.webclient.response-timeout-ms=10000
app.webclient.read-timeout-ms=10000
app.webclient.write-timeout-ms=10000
app.webclient.max-connections=200
app.webclient.pending-acquire-timeout-ms=5000
app.webclient.max-idle-time-ms=20000

# ============================
# ? CORS
# ============================
app.cors.allowed-origins=http://localhost:4200\n\n# ============================\n# ? ACTUATOR\n# ============================\nmanagement.endpoints.web.exposure.include=health,info,prometheus\nmanagement.endpoint.health.show-details=always\n
