# ============================
# ? MODO PRODUCCIÓN / DOCKER
# ============================

server.port=8080
spring.application.name=api-gateway
spring.main.web-application-type=reactive

# --- RUTAS (Docker network) ---
spring.cloud.gateway.routes[0].id=obras
spring.cloud.gateway.routes[0].uri=http://obras-service:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/obras/**

spring.cloud.gateway.routes[1].id=clientes
spring.cloud.gateway.routes[1].uri=http://clientes-service:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/clientes/**

spring.cloud.gateway.routes[2].id=proveedores
spring.cloud.gateway.routes[2].uri=http://proveedores-service:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/proveedores/**

spring.cloud.gateway.routes[3].id=documentos
spring.cloud.gateway.routes[3].uri=http://documentos-service:8087
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/documentos/**

spring.cloud.gateway.routes[4].id=transacciones
spring.cloud.gateway.routes[4].uri=http://transacciones-service:8086
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/transacciones/**

spring.cloud.gateway.routes[5].id=reportes
spring.cloud.gateway.routes[5].uri=http://reportes-service:8084
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/reportes/**

# --- URLs INTERNAS ---
services.obras.audit.url=http://obras-service:8081/api/v1/auditoria
services.clientes.url=http://clientes-service:8082/api/v1/clientes
services.clientes.audit.url=http://clientes-service:8082/api/v1/auditoria
services.proveedores.url=http://proveedores-service:8083/api/v1/proveedores
services.proveedores.audit.url=http://proveedores-service:8083/api/v1/auditoria
services.documentos.url=http://documentos-service:8087/api/v1/documentos
services.documentos.audit.url=http://documentos-service:8087/api/v1/auditoria
services.transacciones.url=http://transacciones-service:8086/api/v1/transacciones
services.transacciones.audit.url=http://transacciones-service:8086/api/v1/auditoria
services.facturas.url=http://transacciones-service:8086/api/v1/facturas
services.reportes.url=http://reportes-service:8084/api/v1/reportes

# --- CORS ---
app.cors.allowed-origins=http://localhost:4200

# --- PRODUCCIÓN: no ejecutar scripts de inicialización ---
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=none

# --- LOG ---
debug=false

# --- WEBCLIENT BUFFER (descargas) ---
spring.codec.max-in-memory-size=20MB

