# ============================
# ? MODO DESARROLLO LOCAL
# ============================

server.port=8080
spring.application.name=api-gateway
spring.main.web-application-type=reactive

# --- RUTAS (localhost) ---
spring.cloud.gateway.routes[0].id=obras
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/obras/**

spring.cloud.gateway.routes[1].id=clientes
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/clientes/**

spring.cloud.gateway.routes[2].id=proveedores
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/proveedores/**

spring.cloud.gateway.routes[3].id=documentos
spring.cloud.gateway.routes[3].uri=http://localhost:8087
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/documentos/**

spring.cloud.gateway.routes[4].id=transacciones
spring.cloud.gateway.routes[4].uri=http://localhost:8086
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/transacciones/**

spring.cloud.gateway.routes[5].id=reportes
spring.cloud.gateway.routes[5].uri=http://localhost:8084
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/reportes/**

# --- URLs DE LOS MICROSERVICIOS ---
services.obras.url=${SERVICES_OBRAS_URL:http://localhost:8081/api/obras}
services.clientes.url=${SERVICES_CLIENTES_URL:http://localhost:8082/api/clientes}
services.proveedores.url=${SERVICES_PROVEEDORES_URL:http://localhost:8083/api/proveedores}
services.agendas.url=${SERVICES_AGENDAS_URL:http://localhost:8085}
services.agendas.tareas.url=${SERVICES_AGENDAS_TAREAS_URL:http://localhost:8085/api/agenda/tareas}
services.obras.tareas.url=${SERVICES_OBRAS_TAREAS_URL:http://localhost:8081/api/obras/tareas}
services.documentos.url=${SERVICES_DOCUMENTOS_URL:http://localhost:8087/api/documentos}
services.transacciones.url=${SERVICES_TRANSACCIONES_URL:http://localhost:8086/api/transacciones}
services.facturas.url=${SERVICES_FACTURAS_URL:http://localhost:8086/api/facturas}
services.reportes.url=${SERVICES_REPORTES_URL:http://localhost:8084/api/reportes}

# --- CORS ---
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins[0]=http://localhost:4200
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true

# --- LOGGING ---
debug=true

# --- WEBCLIENT BUFFER (descargas) ---
spring.codec.max-in-memory-size=20MB

# --- MULTIPART UPLOAD (archivos adjuntos) ---
spring.webflux.multipart.max-file-size=10MB
spring.webflux.multipart.max-request-size=10MB
