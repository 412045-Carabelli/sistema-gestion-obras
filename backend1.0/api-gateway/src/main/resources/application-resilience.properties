# Resilience4j Circuit Breaker Configuration

# Proveedores
resilience4j.circuitbreaker.instances.proveedores.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.proveedores.slidingWindowSize=10
resilience4j.circuitbreaker.instances.proveedores.failureRateThreshold=50
resilience4j.circuitbreaker.instances.proveedores.waitDurationInOpenState=30000
resilience4j.circuitbreaker.instances.proveedores.slowCallRateThreshold=50
resilience4j.circuitbreaker.instances.proveedores.slowCallDurationThreshold=2000

