# ============================
server.port=8080
spring.application.name=api-gateway
spring.main.web-application-type=reactive

# ? Perfil activo por defecto (cuando se ejecuta desde IDE)
spring.profiles.active=dev

# CORS
cors.allowed-origins=http://localhost:4200

# JWT
jwt.secret=${JWT_SECRET:your-super-secret-key-min-32-chars-long-for-hs256-algorithm}

# =========================
# META WHATSAPP BUSINESS API
# =========================
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
whatsapp.template.presupuesto=sgo_presupuesto
whatsapp.template.language=es_AR
