# =========================
# CONFIGURACION GENERAL
# =========================
server.port=8087
spring.application.name=documentos-service

# =========================
# BASE DE DATOS SQL SERVER (dev remoto)
# =========================
spring.datasource.url=jdbc:sqlserver://187.77.60.183:1433;databaseName=sgo_documentos_test;encrypt=false;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:SgoAdmin2024!}

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# =========================
# FLYWAY
# =========================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.repair-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.ignore-migration-patterns=*:missing

# =========================
# SQL INIT (activo)
# =========================
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:data-dev.sql
spring.sql.init.continue-on-error=true
spring.sql.init.encoding=UTF-8
spring.jpa.defer-datasource-initialization=false

# =========================
# CONFIGURACION DE ARCHIVOS (modo dev)
# =========================
file.upload-dir=uploads-dev/


# =========================
# MULTIPART UPLOAD
# =========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================
# MINIO (modo dev)
# =========================
minio.enabled=true
minio.url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=documentos
minio.logos-bucket=logos
minio.public-url=http://localhost:9000
