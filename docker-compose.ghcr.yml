version: '3.9'

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sgo_sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD:-SgoAdmin2024!}
      - MSSQL_PID=Express
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./db/sqlserver-init:/init
    entrypoint: ["/bin/bash", "/init/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost",
             "-U", "sa", "-P", "${DB_PASSWORD:-SgoAdmin2024!}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    networks:
      - sgo_backend

  migrador:
    image: ghcr.io/412045-carabelli/sgo-migrador:latest
    container_name: sgo_migrador
    environment:
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD:-SgoAdmin2024!}
    volumes:
      - obras_data:/data/obras
      - clientes_data:/data/clientes
      - proveedores_data:/data/proveedores
      - reportes_data:/data/reportes
      - transacciones_data:/data/transacciones
      - documentos_data:/data/documentos
      - migration_flags:/data/migration
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: "no"
    networks:
      - sgo_backend

  obras-service:
    image: ghcr.io/412045-carabelli/sgo-obras-service:latest
    container_name: obras_service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD:-SgoAdmin2024!}
    depends_on:
      sqlserver:
        condition: service_healthy
      migrador:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - sgo_backend

  clientes-service:
    image: ghcr.io/412045-carabelli/sgo-clientes-service:latest
    container_name: clientes_service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD:-SgoAdmin2024!}
    depends_on:
      sqlserver:
        condition: service_healthy
      migrador:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - sgo_backend

  proveedores-service:
    image: ghcr.io/412045-carabelli/sgo-proveedores-service:latest
    container_name: proveedores_service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD:-SgoAdmin2024!}
    depends_on:
      sqlserver:
        condition: service_healthy
      migrador:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - sgo_backend

  documentos-service:
    image: ghcr.io/412045-carabelli/sgo-documentos-service:latest
    container_name: documentos_service
    ports:
      - "8087:8087"
    volumes:
      - documentos_uploads:/app/uploads
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD:-SgoAdmin2024!}
    depends_on:
      sqlserver:
        condition: service_healthy
      migrador:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - sgo_backend

  transacciones-service:
    image: ghcr.io/412045-carabelli/sgo-transacciones-service:latest
    container_name: transacciones_service
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD:-SgoAdmin2024!}
    depends_on:
      sqlserver:
        condition: service_healthy
      migrador:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - sgo_backend

  reportes-service:
    image: ghcr.io/412045-carabelli/sgo-reportes-service:latest
    container_name: reportes_service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD:-SgoAdmin2024!}
      - SERVICIOS_OBRAS_BASE_URL=http://obras-service:8081
      - SERVICIOS_CLIENTES_BASE_URL=http://clientes-service:8082
      - SERVICIOS_PROVEEDORES_BASE_URL=http://proveedores-service:8083
      - SERVICIOS_TRANSACCIONES_BASE_URL=http://transacciones-service:8086
      - SERVICIOS_FACTURAS_BASE_URL=http://transacciones-service:8086
    depends_on:
      sqlserver:
        condition: service_healthy
      migrador:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - sgo_backend

  api-gateway:
    image: ghcr.io/412045-carabelli/sgo-api-gateway:latest
    container_name: api_gateway_service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVICES_OBRAS_URL=http://obras-service:8081/api/obras
      - SERVICES_CLIENTES_URL=http://clientes-service:8082/api/clientes
      - SERVICES_PROVEEDORES_URL=http://proveedores-service:8083/api/proveedores
      - SERVICES_DOCUMENTOS_URL=http://documentos-service:8087/api/documentos
      - SERVICES_TRANSACCIONES_URL=http://transacciones-service:8086/api/transacciones
    depends_on:
      - obras-service
      - clientes-service
      - proveedores-service
      - documentos-service
      - transacciones-service
      - reportes-service
    restart: unless-stopped
    networks:
      - sgo_backend

  frontend:
    image: ghcr.io/412045-carabelli/sgo-frontend:latest
    container_name: obras_frontend
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    restart: unless-stopped
    networks:
      - sgo_backend

networks:
  sgo_backend:
    driver: bridge

volumes:
  sqlserver_data:
  migration_flags:
  obras_data:
  clientes_data:
  proveedores_data:
  documentos_data:
  documentos_uploads:
  transacciones_data:
  reportes_data:
