services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sgo_sqlserver_v2
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Express
      - MSSQL_MEMORY_LIMIT_MB=1536
    volumes:
      - sqlserver_data_v2:/var/opt/mssql
      - ./db/sqlserver-init:/init
      - backup_data:/backups
    entrypoint: ["/bin/bash", "/init/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "127.0.0.1",
             "-U", "sa", "-P", "${DB_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 300s
    restart: unless-stopped
    networks:
      - sgo_backend
    deploy:
      resources:
        limits:
          memory: 1792M

  minio:
    image: minio/minio:latest
    container_name: minio_v2
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    restart: unless-stopped
    networks:
      - sgo_backend
    deploy:
      resources:
        limits:
          memory: 512M

  obras-service:
    pull_policy: always
    image: ghcr.io/412045-carabelli/sgo-obras-service:latest
    container_name: obras_service_v2
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_obras;encrypt=false;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.SQLServerDialect
      - SPRING_FLYWAY_ENABLED=true
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sgo_backend
    deploy:
      resources:
        limits:
          memory: 512M

  clientes-service:
    pull_policy: always
    image: ghcr.io/412045-carabelli/sgo-clientes-service:latest
    container_name: clientes_service_v2
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_clientes;encrypt=false;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.SQLServerDialect
      - SPRING_FLYWAY_ENABLED=true
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sgo_backend
    deploy:
      resources:
        limits:
          memory: 512M

  proveedores-service:
    pull_policy: always
    image: ghcr.io/412045-carabelli/sgo-proveedores-service:latest
    container_name: proveedores_service_v2
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_proveedores;encrypt=false;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.SQLServerDialect
      - SPRING_FLYWAY_ENABLED=true
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sgo_backend
    deploy:
      resources:
        limits:
          memory: 512M

  documentos-service:
    pull_policy: always
    image: ghcr.io/412045-carabelli/sgo-documentos-service:latest
    container_name: documentos_service_v2
    ports:
      - "8087:8087"
    volumes:
      - documentos_uploads_v2:/app/uploads
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_documentos;encrypt=false;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.SQLServerDialect
      - SPRING_FLYWAY_ENABLED=true
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sgo_backend
    deploy:
      resources:
        limits:
          memory: 512M

  transacciones-service:
    pull_policy: always
    image: ghcr.io/412045-carabelli/sgo-transacciones-service:latest
    container_name: transacciones_service_v2
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_transacciones;encrypt=false;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.SQLServerDialect
      - SPRING_FLYWAY_ENABLED=true
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx384m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sgo_backend
    deploy:
      resources:
        limits:
          memory: 512M

  agendas-service:
    pull_policy: always
    image: ghcr.io/412045-carabelli/sgo-agendas-service:latest
    container_name: agendas_service_v2
    ports:
      - "8085:8085"
    volumes:
      - ./backend1.0/agendas-service/src/main/resources/db/migration:/app/db/migration
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_agendas;encrypt=false;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.SQLServerDialect
      - SPRING_FLYWAY_ENABLED=true
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sgo_backend
    deploy:
      resources:
        limits:
          memory: 512M

  reportes-service:
    pull_policy: always
    image: ghcr.io/412045-carabelli/sgo-reportes-service:latest
    container_name: reportes_service_v2
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8084
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_reportes;encrypt=false;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.SQLServerDialect
      - SPRING_FLYWAY_ENABLED=true
      - SERVICIOS_OBRAS_BASE_URL=http://obras-service:8081
      - SERVICIOS_CLIENTES_BASE_URL=http://clientes-service:8082
      - SERVICIOS_PROVEEDORES_BASE_URL=http://proveedores-service:8083
      - SERVICIOS_TRANSACCIONES_BASE_URL=http://transacciones-service:8086
      - SERVICIOS_FACTURAS_BASE_URL=http://transacciones-service:8086
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx384m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sgo_backend
    deploy:
      resources:
        limits:
          memory: 512M

  auth-service:
    pull_policy: always
    image: ghcr.io/412045-carabelli/sgo-auth-service:latest
    container_name: auth_service_v2
    ports:
      - "8089:8089"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_auth;encrypt=false;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.SQLServerDialect
      - SPRING_FLYWAY_ENABLED=true
      - JWT_SECRET=${JWT_SECRET}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@buildrr.cloud}
      - PUSH_INTERNAL_SECRET=${PUSH_INTERNAL_SECRET}
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sgo_backend
    deploy:
      resources:
        limits:
          memory: 512M

  api-gateway:
    pull_policy: always
    image: ghcr.io/412045-carabelli/sgo-api-gateway:latest
    container_name: api_gateway_service_v2
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVICES_OBRAS_URL=http://obras-service:8081/api/obras
      - SERVICES_CLIENTES_URL=http://clientes-service:8082/api/clientes
      - SERVICES_PROVEEDORES_URL=http://proveedores-service:8083/api/proveedores
      - SERVICES_DOCUMENTOS_URL=http://documentos-service:8087/api/documentos
      - SERVICES_TRANSACCIONES_URL=http://transacciones-service:8086/api/transacciones
      - SERVICES_AGENDAS_URL=http://agendas-service:8085/api/agendas
      - SERVICES_OBRAS_TAREAS_URL=http://obras-service:8081/api/obras/tareas
      - SERVICES_AGENDAS_TAREAS_URL=http://agendas-service:8085/api/agenda/tareas
      - SERVICES_REPORTES_URL=http://reportes-service:8084/api/reportes
      - JWT_SECRET=${JWT_SECRET}
      - PUSH_INTERNAL_SECRET=${PUSH_INTERNAL_SECRET}
      - CORS_ALLOWED_ORIGINS=http://localhost:4200,https://buildrr.cloud,http://buildrr.cloud
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    depends_on:
      obras-service:
        condition: service_started
      clientes-service:
        condition: service_started
      proveedores-service:
        condition: service_started
      documentos-service:
        condition: service_started
      transacciones-service:
        condition: service_started
      agendas-service:
        condition: service_started
      reportes-service:
        condition: service_started
      auth-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - sgo_backend
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    pull_policy: always
    image: ghcr.io/412045-carabelli/sgo-frontend:latest
    container_name: obras_frontend_v2
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    restart: unless-stopped
    networks:
      - sgo_backend
      - dokploy-network
    deploy:
      resources:
        limits:
          memory: 256M

  backup:
    build: ./backup
    container_name: sgo_backup
    environment:
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - backup_data:/backups
      - minio_data:/minio-data:ro
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - sgo_backend

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - TZ=America/Argentina/Córdoba
      - DB_TYPE=mssql
      - DB_MSSQL_HOST=sqlserver
      - DB_MSSQL_PORT=1433
      - DB_MSSQL_DATABASE=n8n
      - DB_MSSQL_USER=sa
      - DB_MSSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - n8n_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  waha:
    image: devlikeapro/waha
    container_name: sgo_waha
    ports:
      - "3001:3000"
    volumes:
      - waha_data:/app/.waha/sessions
    environment:
      - WHATSAPP_DEFAULT_ENGINE=NOWEB
      - WAHA_DASHBOARD_ENABLED=true
      - WAHA_DASHBOARD_USERNAME=${WAHA_USER:-admin}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_PASSWORD:-admin123}
      - WHATSAPP_API_KEY=${WAHA_API_KEY:-sgo2026}
      - WHATSAPP_HOOK_URL=http://bot-whatsapp:4000/webhook
      - WHATSAPP_HOOK_EVENTS=message
    restart: unless-stopped
    networks:
      - sgo_backend
    deploy:
      resources:
        limits:
          memory: 512M

  bot-whatsapp:
    pull_policy: always
    image: ghcr.io/412045-carabelli/sgo-bot-whatsapp:latest
    container_name: sgo_bot_whatsapp
    ports:
      - "4000:4000"
    environment:
      - WAHA_URL=http://waha:3000
      - WAHA_API_KEY=${WAHA_API_KEY:-sgo2026}
      - API_GATEWAY_URL=http://api-gateway:8080
      - WAHA_SESSION=default
      - PORT=4000
      - NUMEROS_AUTORIZADOS=${BOT_NUMEROS_AUTORIZADOS:-}
      - NUMEROS_NOTIFICACIONES=${BOT_NUMEROS_NOTIFICACIONES:-}
      - DIAS_VENCIMIENTO=${BOT_DIAS_VENCIMIENTO:-7}
      - CRON_NOTIFICACIONES=${BOT_CRON_NOTIFICACIONES:-0 11 * * *}
    depends_on:
      - waha
      - api-gateway
    restart: unless-stopped
    networks:
      - sgo_backend
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  sgo_backend:
    driver: bridge
  n8n_network:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  sqlserver_data_v2:
  migration_flags_v2:
  obras_data_v2:
  clientes_data_v2:
  proveedores_data_v2:
  documentos_data_v2:
  documentos_uploads_v2:
  transacciones_data_v2:
  reportes_data_v2:
  n8n_data:
  waha_data:
  backup_data:
  minio_data:
