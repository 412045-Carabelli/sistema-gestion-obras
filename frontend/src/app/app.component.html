@if (!isPublicRoute) {
  <app-changelog-modal></app-changelog-modal>
}

<div class="flex flex-col h-screen bg-gray-50">

  @if (!isPublicRoute) {
    <!-- 🧭 Header -->
    <app-header (toggleMenu)="toggleSidebar()"></app-header>
  }

  <!-- 🧭 Container principal -->
  <div class="flex flex-1 overflow-hidden">

    @if (!isPublicRoute && sidebarVisible) {
      <!-- 📌 Sidebar -->
      <app-sidebar [visible]="sidebarVisible"></app-sidebar>
    }

    <!-- 📄 Main Content -->
    <main class="flex-1 overflow-y-auto bg-gray-50 transition-all duration-300">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
