<div
  class="w-full bg-white rounded-xl shadow-md p-5"
  [style.borderLeftColor]="borderColor"
  [style.borderLeftWidth.px]="4"
  [style.minHeight.px]="minHeight"
  [pTooltip]="tooltip || ''"
  tooltipPosition="top">
  <p class="text-xs font-poppins font-semibold uppercase" [style.color]="textColor">{{ title }}</p>
  <p [style.fontSize.px]="valueFontSize" class="font-poppins font-bold text-gray-900">{{ value }}</p>
  @if (description) {
    <p class="text-xs text-gray-500 mt-1">{{ description }}</p>
  }
</div>
