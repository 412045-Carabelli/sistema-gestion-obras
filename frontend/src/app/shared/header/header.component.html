<header class="sticky top-0 z-50 bg-white border-b border-gray-200 px-4 py-3">
  <div class="flex items-center justify-between">

    <!-- Menu Toggle & Logo -->
    <div class="flex items-center gap-4">
      <p-button
        (onClick)="onToggleMenu()"
        [rounded]="true"
        [text]="true"
        icon="pi pi-bars"
        styleClass="text-gray-700">
      </p-button>

      <div class="flex items-center gap-2 hidden sm:flex">
        <img src="/buildr-icono.svg" alt="Buildr" class="h-10 w-10">
        <span class="text-gray-400 text-lg">×</span>
        <img [src]="logoUrl" alt="Logo empresa" class="h-8 object-contain">
      </div>
      <div class="flex sm:hidden items-center gap-2">
        <img src="/buildr-icono.svg" alt="Buildr" class="h-8 w-8">
      </div>
    </div>

    <!-- Welcome Message -->
    <div class="hidden md:flex items-center gap-2 text-gray-700">
      <span class="font-poppins font-normal">Bienvenido,</span>
      <strong class="font-poppins font-semibold text-gray-900">{{ userName }}</strong>
    </div>

  </div>
</header>
