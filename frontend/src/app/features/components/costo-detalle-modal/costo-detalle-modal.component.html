<p-dialog
  [(visible)]="visible"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [header]="'Detalle del Costo'"
  [style]="{width: '500px'}"
  [closeOnEscape]="true"
  [draggable]="false">

  <div class="space-y-4" *ngIf="costoEditando">
    <!-- Fila 1: Descripción, Cantidad, Precio -->
    <div class="grid grid-cols-3 gap-4">
      <div>
        <label class="text-sm font-medium block mb-1">Descripción</label>
        <input
          type="text"
          [(ngModel)]="costoEditando.descripcion"
          class="w-full px-2 py-1 border rounded text-sm"
          disabled>
      </div>
      <div>
        <label class="text-sm font-medium block mb-1">Cantidad</label>
        <input
          type="number"
          [(ngModel)]="costoEditando.cantidad"
          class="w-full px-2 py-1 border rounded text-sm text-right"
          disabled>
      </div>
      <div>
        <label class="text-sm font-medium block mb-1">Precio Unit.</label>
        <div class="text-sm px-2 py-1 border rounded bg-gray-50 text-right">
          {{ costoEditando.precio_unitario | currency:'ARS' }}
        </div>
      </div>
    </div>

    <!-- Fila 2: Beneficio, Subtotal -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-sm font-medium block mb-1">Beneficio (%)</label>
        <input
          type="number"
          [(ngModel)]="costoEditando.beneficio"
          class="w-full px-2 py-1 border rounded text-sm text-right"
          disabled>
      </div>
      <div>
        <label class="text-sm font-medium block mb-1">Subtotal</label>
        <div class="text-sm px-2 py-1 border rounded bg-gray-50 text-right font-semibold">
          {{ costoEditando.subtotal | currency:'ARS' }}
        </div>
      </div>
    </div>

    <!-- Fila 3: Gasto Real, Desvío -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-sm font-medium block mb-1">Gasto Real</label>
        @if (modoEdicion) {
          <p-inputNumber
            [(ngModel)]="costoEditando.monto_real"
            mode="currency"
            currency="ARS"
            locale="es-AR"
            [useGrouping]="true"
            [minFractionDigits]="2"
            [maxFractionDigits]="2"
            inputStyleClass="w-full text-right"
            placeholder="Sin registro"
            [min]="0">
          </p-inputNumber>
        } @else {
          <div class="text-sm px-2 py-1 border rounded bg-gray-50 text-right">
            {{ costoEditando.monto_real ? (costoEditando.monto_real | currency:'ARS') : '—' }}
          </div>
        }
      </div>
      <div>
        <label class="text-sm font-medium block mb-1">Desvío</label>
        <div
          class="text-sm px-2 py-1 border rounded text-right font-semibold"
          [ngClass]="{
            'bg-green-50 text-green-600': (calcularDesvio() ?? 0) >= 0,
            'bg-red-50 text-red-600': (calcularDesvio() ?? 0) < 0
          }">
          {{ calcularDesvio() | currency:'ARS' }}
        </div>
      </div>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <button
      pButton
      type="button"
      label="Cancelar"
      (click)="cerrar()"
      class="p-button-text">
    </button>
    <button
      pButton
      type="button"
      label="Guardar"
      (click)="guardarCambios()"
      class="p-button-primary">
    </button>
  </ng-template>
</p-dialog>
