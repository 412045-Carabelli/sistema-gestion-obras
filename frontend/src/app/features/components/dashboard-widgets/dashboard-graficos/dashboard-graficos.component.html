@if (loading) {
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    @for (i of [1, 2]; track i) {
      <div class="bg-white rounded-xl shadow-md p-6 animate-pulse">
        <div class="h-4 bg-gray-200 rounded w-1/3 mb-5"></div>
        <div class="h-64 bg-gray-100 rounded-lg"></div>
      </div>
    }
  </div>
} @else {
  @if (datos) {
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">

      <!-- Torta: distribución por estado -->
      <div class="bg-white rounded-xl shadow-md p-6">
        <div class="flex items-center justify-between mb-5 pb-3 border-b border-gray-200">
          <h2 class="font-poppins font-semibold text-gray-900 flex items-center gap-2">
            <i class="pi pi-chart-pie text-indigo-600"></i>
            Distribución por estado
          </h2>
          <span class="text-xs font-poppins font-normal text-gray-500">Obras activas</span>
        </div>
        <div class="chart-container">
          <p-chart type="pie" [data]="pieData" [options]="pieOptions" width="100%" height="260"></p-chart>
        </div>
      </div>

      <!-- Barras: top 5 obras financiero -->
      <div class="bg-white rounded-xl shadow-md p-6">
        <div class="flex items-center justify-between mb-5 pb-3 border-b border-gray-200">
          <h2 class="font-poppins font-semibold text-gray-900 flex items-center gap-2">
            <i class="pi pi-chart-bar text-emerald-600"></i>
            Top 5 obras — volumen financiero
          </h2>
          <span class="text-xs font-poppins font-normal text-gray-500">Presupuesto vs cobrado vs pagado</span>
        </div>
        <div class="chart-container">
          <p-chart type="bar" [data]="barData" [options]="barOptions" width="100%" height="260"></p-chart>
        </div>
      </div>

    </div>
  }
}

@if (!loading && !datos) {
  <div class="flex flex-col items-center justify-center py-12 text-gray-400">
    <i class="pi pi-chart-bar text-4xl mb-3"></i>
    <span class="font-poppins text-sm">No se pudieron cargar los gráficos</span>
  </div>
}
