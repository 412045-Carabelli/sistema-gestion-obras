<p-toast position="bottom-right"></p-toast>
<p-confirmDialog></p-confirmDialog>

@switch (true) {
  @case (currentRoute === '/agendas' || currentRoute === '/agendas/gantt') {
    <app-layout-header type="list" title="Agendas" subtitle="Gestión de tareas y agendas del proyecto">
      <ng-container header-actions>
        <div class="view-toggle">
          <button
            class="view-toggle-btn"
            [class.active]="currentRoute === '/agendas'"
            routerLink="/agendas"
            pTooltip="Vista Lista" tooltipPosition="bottom">
            <i class="pi pi-list"></i>
            <span class="toggle-label">Lista</span>
          </button>
          <button
            class="view-toggle-btn"
            [class.active]="currentRoute === '/agendas/gantt'"
            routerLink="/agendas/gantt"
            pTooltip="Vista Gantt" tooltipPosition="bottom">
            <i class="pi pi-chart-bar"></i>
            <span class="toggle-label">Gantt</span>
          </button>
        </div>
        <p-button
          label="Nuevo Evento"
          icon="pi pi-plus"
          (onClick)="abrirModalCrearAgenda()"
          class="btn-mobile-icon"
          styleClass="p-button">
        </p-button>
      </ng-container>
    </app-layout-header>
  }
  @default {
    <div class="p-4">
      <h1 class="font-poppins text-3xl font-semibold text-gray-800 m-0">Agendas</h1>
    </div>
  }
}

<div class="p-5 bg-gray-50">
  <router-outlet></router-outlet>
</div>
