<p-toast></p-toast>

<div class="login-page">
  <div class="login-bg">
    <div class="grid-lines"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-brand">
      <img src="/buildr-logo.svg" alt="buildrr" class="login-logo" />
    </div>

    <div class="login-card">
      <div class="login-card-header">
        <h1 class="login-title">Crear cuenta</h1>
        <p class="login-sub">Empezá a gestionar tus obras en minutos</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="register()" class="login-form">
        <div class="field">
          <label for="empresaNombre" class="field-label">Nombre de empresa</label>
          <input
            id="empresaNombre"
            formControlName="empresaNombre"
            type="text"
            placeholder="Ej: Constructora García"
            class="field-input"
            [class.field-error-input]="form.get('empresaNombre')?.invalid && form.get('empresaNombre')?.touched"
          />
          <small class="field-error" *ngIf="form.get('empresaNombre')?.invalid && form.get('empresaNombre')?.touched">
            Ingresá el nombre de tu empresa (mín. 2 caracteres)
          </small>
        </div>

        <div class="field">
          <label for="email" class="field-label">Email</label>
          <input
            id="email"
            formControlName="email"
            type="email"
            placeholder="tu@empresa.com"
            class="field-input"
            [class.field-error-input]="form.get('email')?.invalid && form.get('email')?.touched"
          />
          <small class="field-error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
            Ingresá un email válido
          </small>
        </div>

        <div class="field">
          <label for="username" class="field-label">Usuario</label>
          <input
            id="username"
            formControlName="username"
            type="text"
            placeholder="Tu nombre de usuario"
            class="field-input"
            [class.field-error-input]="form.get('username')?.invalid && form.get('username')?.touched"
          />
          <small class="field-error" *ngIf="form.get('username')?.invalid && form.get('username')?.touched">
            Entre 3 y 100 caracteres
          </small>
        </div>

        <div class="field">
          <label for="password" class="field-label">Contraseña</label>
          <input
            id="password"
            formControlName="password"
            type="password"
            placeholder="Mínimo 8 caracteres"
            class="field-input"
            [class.field-error-input]="form.get('password')?.invalid && form.get('password')?.touched"
          />
          <small class="field-error" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
            Mínimo 8 caracteres
          </small>
        </div>

        <div class="field">
          <label for="confirmPassword" class="field-label">Confirmar contraseña</label>
          <input
            id="confirmPassword"
            formControlName="confirmPassword"
            type="password"
            placeholder="Repetí tu contraseña"
            class="field-input"
            [class.field-error-input]="form.get('confirmPassword')?.errors?.['passwordMismatch']"
          />
          <small class="field-error" *ngIf="form.get('confirmPassword')?.errors?.['passwordMismatch']">
            Las contraseñas no coinciden
          </small>
        </div>

        <button
          type="submit"
          class="btn-submit"
          [disabled]="form.invalid || loading">
          @if (loading) {
            <i class="pi pi-spin pi-spinner"></i> Creando cuenta...
          } @else {
            Crear cuenta
          }
        </button>
      </form>

      <p class="login-footer">
        ¿Ya tenés cuenta?
        <a (click)="goToLogin()" class="login-footer-link">Iniciá sesión</a>
      </p>
    </div>
  </div>
</div>
