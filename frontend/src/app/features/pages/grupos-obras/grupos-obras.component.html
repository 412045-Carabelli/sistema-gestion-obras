@defer (when datosCargados) {
    <div class="flex flex-col gap-4">
      <!-- Filtros -->
      <div class="bg-white p-4 rounded-lg border border-gray-200">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
          <div class="md:col-span-6">
            <p-iconfield iconPosition="left" styleClass="w-full">
              <p-inputicon styleClass="pi pi-search"/>
              <input
                (input)="applyFilter()"
                [(ngModel)]="searchValue"
                class="w-full p-inputtext-sm h-12"
                pInputText
                placeholder="Buscar por nombre o cliente"
                type="text"/>
            </p-iconfield>
          </div>

          <div class="md:col-span-5"></div>

          <div class="md:col-span-1 flex items-center gap-2 h-12">
            <p-checkbox
              [(ngModel)]="mostrarInactivos"
              [binary]="true"
              inputId="gruposMostrarInactivos"
              (ngModelChange)="onMostrarInactivosChange()">
            </p-checkbox>
            <label for="gruposMostrarInactivos" class="text-base text-gray-700">
              Ver inactivos
            </label>
          </div>
        </div>
      </div>

      <!-- Tabla -->
      <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
        <p-table
          [rowHover]="true"
          [value]="gruposFiltrados"
          [paginator]="true"
          [rows]="8"
          responsiveLayout="scroll"
          styleClass="p-datatable-sm">

          <ng-template pTemplate="header">
            <tr>
              <th pSortableColumn="nombre" class="text-left font-semibold">Nombre <p-sortIcon field="nombre"></p-sortIcon></th>
              <th pSortableColumn="id_cliente" class="text-left font-semibold">Cliente <p-sortIcon field="id_cliente"></p-sortIcon></th>
              <th pSortableColumn="activo" class="text-center font-semibold">Activo <p-sortIcon field="activo"></p-sortIcon></th>
              <th class="text-center font-semibold">Acciones</th>
            </tr>
          </ng-template>

          <ng-template let-grupo pTemplate="body">
            <tr class="cursor-pointer hover:bg-gray-50 transition-colors">
              <td class="font-semibold text-gray-900 text-sm">{{ grupo.nombre }}</td>
              <td class="text-gray-700">{{ getNombreCliente(grupo.id_cliente) }}</td>
              <td class="text-center">
                <i [class]="grupo.activo ? 'pi pi-check text-green-600' : 'pi pi-times text-red-600'"></i>
              </td>
              <td class="text-center space-x-2">
                <p-button
                  icon="pi pi-pencil"
                  severity="info"
                  [rounded]="true"
                  [text]="true"
                  (onClick)="editGrupo(grupo)"
                ></p-button>
                <p-button
                  icon="pi pi-trash"
                  severity="danger"
                  [rounded]="true"
                  [text]="true"
                  (onClick)="deleteGrupo(grupo)"
                ></p-button>
              </td>
            </tr>
          </ng-template>

          <ng-template pTemplate="emptymessage">
            <tr>
              <td class="text-center py-10" colspan="4">
                <div class="flex flex-col items-center justify-center gap-2 text-gray-500">
                  <i class="pi pi-inbox text-3xl"></i>
                  <p class="text-base font-medium">No hay registros para mostrar</p>
                  <p class="text-sm">Ajusta los filtros o crea un nuevo registro.</p>
                </div>
              </td>
            </tr>
          </ng-template>
        </p-table>
      </div>
    </div>
} @placeholder {
  <div class="flex flex-col gap-4 animate-pulse">
    <div class="bg-white p-4 rounded-lg border border-gray-200">
      <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
        <div class="md:col-span-8 h-10 bg-gray-200 rounded"></div>
        <div class="md:col-span-4 h-10 bg-gray-200 rounded"></div>
      </div>
    </div>

    <div class="bg-white rounded-lg border border-gray-200 p-4">
      <div class="space-y-3">
        <div class="h-5 bg-gray-200 rounded w-full"></div>
        <div class="h-5 bg-gray-200 rounded w-11/12"></div>
        <div class="h-5 bg-gray-200 rounded w-10/12"></div>
        <div class="h-5 bg-gray-200 rounded w-9/12"></div>
        <div class="h-5 bg-gray-200 rounded w-8/12"></div>
      </div>
    </div>
  </div>
}

<!-- Modal de creación/edición -->
<p-dialog
  [(visible)]="showModal"
  [header]="isEditing ? 'Editar grupo' : 'Crear grupo'"
  [modal]="true"
  [closable]="true"
  styleClass="w-full md:w-1/3"
  [closeOnEscape]="true"
>
  <form [formGroup]="form" (ngSubmit)="guardar()" class="space-y-4">
    <div class="flex flex-col gap-2">
      <label class="font-semibold text-sm text-gray-700">Cliente *</label>
      <p-select
        formControlName="id_cliente"
        [options]="clientesOptions"
        placeholder="Seleccionar cliente"
        styleClass="w-full"
      ></p-select>
      <small class="text-red-600" *ngIf="form.get('id_cliente')?.invalid && form.get('id_cliente')?.touched">
        Cliente requerido
      </small>
    </div>

    <div class="flex flex-col gap-2">
      <label class="font-semibold text-sm text-gray-700">Nombre del grupo *</label>
      <input
        type="text"
        pInputText
        formControlName="nombre"
        placeholder="Ej: Obras principales, Proyectos secundarios"
        class="w-full"
      />
      <small class="text-red-600" *ngIf="form.get('nombre')?.invalid && form.get('nombre')?.touched">
        Nombre requerido (mín. 3 caracteres)
      </small>
    </div>
  </form>

  <ng-template pTemplate="footer">
    <p-button
      label="Cancelar"
      icon="pi pi-times"
      (onClick)="showModal = false"
      severity="secondary"
    ></p-button>
    <p-button
      [label]="isEditing ? 'Actualizar' : 'Crear'"
      icon="pi pi-check"
      (click)="guardar()"
      [loading]="guardando"
      [disabled]="guardando"
    ></p-button>
  </ng-template>
</p-dialog>
