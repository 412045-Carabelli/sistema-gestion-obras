<p-toast></p-toast>

<div class="login-page">
  <div class="login-bg">
    <div class="grid-lines"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-brand">
      <img src="/buildr-logo.svg" alt="buildrr" class="login-logo" />
    </div>

    <div class="login-card">
      <div class="login-card-header">
        <h1 class="login-title">Iniciar sesión</h1>
        <p class="login-sub">Ingresá a tu cuenta</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="login()" class="login-form">
        <div class="field">
          <label for="email" class="field-label">Email</label>
          <input
            id="email"
            formControlName="email"
            type="email"
            placeholder="tu@empresa.com"
            class="field-input"
            [class.field-error-input]="form.get('email')?.invalid && form.get('email')?.touched"
          />
          <small class="field-error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
            Ingresá un email válido
          </small>
        </div>

        <div class="field">
          <label for="password" class="field-label">Contraseña</label>
          <input
            id="password"
            formControlName="password"
            type="password"
            placeholder="••••••••"
            class="field-input"
            [class.field-error-input]="form.get('password')?.invalid && form.get('password')?.touched"
          />
          <small class="field-error" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
            Mínimo 8 caracteres
          </small>
        </div>

        <button
          type="submit"
          class="btn-submit"
          [disabled]="form.invalid || loading">
          @if (loading) {
            <i class="pi pi-spin pi-spinner"></i> Ingresando...
          } @else {
            Iniciar sesión
          }
        </button>
      </form>
    </div>
  </div>
</div>
