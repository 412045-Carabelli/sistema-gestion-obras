<p-toast></p-toast>

<div class="flex justify-center items-center min-h-screen bg-gray-100">
  <p-card [style]="{ width: '450px' }" class="shadow-lg">
    <ng-template pTemplate="header">
      <div class="text-center py-4">
        <h1 class="text-2xl font-bold">SGO</h1>
        <p class="text-gray-600">Sistema de Gestión de Obras</p>
      </div>
    </ng-template>

    <h2 class="text-xl font-semibold mb-6 text-center">Cambiar Contraseña</h2>

    <form [formGroup]="form" (ngSubmit)="changePassword()" class="space-y-4">
      <!-- Current Password -->
      <div class="field">
        <label for="currentPassword" class="block text-sm font-medium mb-2">Contraseña Actual</label>
        <input
          pInputText
          id="currentPassword"
          formControlName="currentPassword"
          type="password"
          placeholder="Tu contraseña actual"
          class="w-full"
          [ngClass]="{ 'ng-invalid ng-touched': form.get('currentPassword')?.invalid && form.get('currentPassword')?.touched }"
        />
        <small class="text-red-600" *ngIf="form.get('currentPassword')?.invalid && form.get('currentPassword')?.touched">
          La contraseña es requerida
        </small>
      </div>

      <!-- New Password -->
      <div class="field">
        <label for="newPassword" class="block text-sm font-medium mb-2">Nueva Contraseña</label>
        <input
          pInputText
          id="newPassword"
          formControlName="newPassword"
          type="password"
          placeholder="Mínimo 8 caracteres"
          class="w-full"
          [ngClass]="{ 'ng-invalid ng-touched': form.get('newPassword')?.invalid && form.get('newPassword')?.touched }"
        />
        <small class="text-red-600" *ngIf="form.get('newPassword')?.invalid && form.get('newPassword')?.touched">
          La contraseña debe tener al menos 8 caracteres
        </small>
      </div>

      <!-- Confirm New Password -->
      <div class="field">
        <label for="confirmPassword" class="block text-sm font-medium mb-2">Confirmar Nueva Contraseña</label>
        <input
          pInputText
          id="confirmPassword"
          formControlName="confirmPassword"
          type="password"
          placeholder="Repite tu nueva contraseña"
          class="w-full"
          [ngClass]="{ 'ng-invalid ng-touched': form.get('confirmPassword')?.invalid && form.get('confirmPassword')?.touched }"
        />
        <small class="text-red-600" *ngIf="form.get('confirmPassword')?.errors?.['passwordMismatch']">
          Las contraseñas no coinciden
        </small>
      </div>

      <!-- Buttons -->
      <div class="flex gap-3 pt-4">
        <p-button
          label="Cambiar"
          [loading]="loading"
          [disabled]="form.invalid || loading"
          (onClick)="changePassword()"
          [style]="{ flex: '1' }"
          icon="pi pi-key"
        ></p-button>
        <p-button
          label="Cancelar"
          (onClick)="cancel()"
          [style]="{ flex: '1' }"
          severity="secondary"
          icon="pi pi-times"
        ></p-button>
      </div>
    </form>
  </p-card>
</div>
