<p-toast position="bottom-right"></p-toast>

<!-- ===================== HEADER CON GRADIENTE ===================== -->
<div class="relative bg-gradient-to-r from-indigo-600 to-purple-800 shadow-lg p-8 text-white overflow-hidden">
  <div class="absolute inset-0 opacity-10">
    <div class="absolute -right-10 -top-10 w-40 h-40 bg-white rounded-full"></div>
    <div class="absolute -left-10 -bottom-10 w-32 h-32 bg-white rounded-full"></div>
  </div>

  <div class="relative z-10">
    <h1 class="text-3xl font-bold mb-2">Dashboard General</h1>
    <p class="text-indigo-100">Vista general del sistema - Resumen de actividades</p>
  </div>
</div>

<div class="p-8 space-y-8 max-w-full mx-auto">

  <!-- ===================== ACCESOS RÁPIDOS ===================== -->
  <div class="bg-white rounded-xl shadow-md p-6">
    <h2 class="text-lg font-semibold text-gray-900 mb-5 flex items-center gap-2 pb-3 border-b border-gray-200">
      <i class="pi pi-bolt text-indigo-600"></i>
      Accesos Rápidos
    </h2>

    <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
      <button
        (click)="abrirMovimientoModal()"
        class="cursor-pointer flex flex-col items-center gap-3 p-4 rounded-lg bg-gradient-to-br from-green-50 to-green-100 hover:from-green-100 hover:to-green-200 transition-all border border-green-200 hover:shadow-md">
        <div class="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center">
          <i class="pi pi-arrow-right-arrow-left text-white text-xl"></i>
        </div>
        <span class="text-sm font-semibold text-gray-700 text-center">Nuevo movimiento</span>
      </button>

      <button
        (click)="abrirFacturaModal()"
        class="cursor-pointer flex flex-col items-center gap-3 p-4 rounded-lg bg-gradient-to-br from-teal-50 to-teal-100 hover:from-teal-100 hover:to-teal-200 transition-all border border-teal-200 hover:shadow-md">
        <div class="w-12 h-12 bg-teal-500 rounded-full flex items-center justify-center">
          <i class="pi pi-file text-white text-xl"></i>
        </div>
        <span class="text-sm font-semibold text-gray-700 text-center">Nueva factura</span>
      </button>

      <button
        (click)="abrirClienteModal()"
        class="cursor-pointer flex flex-col items-center gap-3 p-4 rounded-lg bg-gradient-to-br from-blue-50 to-blue-100 hover:from-blue-100 hover:to-blue-200 transition-all border border-blue-200 hover:shadow-md">
        <div class="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center">
          <i class="pi pi-user-plus text-white text-xl"></i>
        </div>
        <span class="text-sm font-semibold text-gray-700 text-center">Nuevo cliente</span>
      </button>

      <button
        (click)="abrirProveedorModal()"
        class="cursor-pointer flex flex-col items-center gap-3 p-4 rounded-lg bg-gradient-to-br from-purple-50 to-purple-100 hover:from-purple-100 hover:to-purple-200 transition-all border border-purple-200 hover:shadow-md">
        <div class="w-12 h-12 bg-purple-500 rounded-full flex items-center justify-center">
          <i class="pi pi-truck text-white text-xl"></i>
        </div>
        <span class="text-sm font-semibold text-gray-700 text-center">Nuevo proveedor</span>
      </button>

      <button
        (click)="abrirTareaModal()"
        class="cursor-pointer flex flex-col items-center gap-3 p-4 rounded-lg bg-gradient-to-br from-orange-50 to-orange-100 hover:from-orange-100 hover:to-orange-200 transition-all border border-orange-200 hover:shadow-md">
        <div class="w-12 h-12 bg-orange-500 rounded-full flex items-center justify-center">
          <i class="pi pi-list-check text-white text-xl"></i>
        </div>
        <span class="text-sm font-semibold text-gray-700 text-center">Nueva tarea</span>
      </button>
    </div>
  </div>

  <!-- ===================== FILTROS DEL DASHBOARD ===================== -->
  <div class="bg-white rounded-xl shadow-md p-6">
    <div class="flex items-center justify-between mb-5 pb-3 border-b border-gray-200">
      <h2 class="text-lg font-semibold text-gray-900 flex items-center gap-2">
        <i class="pi pi-filter text-indigo-600"></i>
        Filtros del dashboard
      </h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-4">
      <div>
        <label class="block text-sm font-medium mb-1 text-gray-700">Obra</label>
        <p-autoComplete
          [(ngModel)]="filtrosDashboard.obra"
          [suggestions]="filteredObras"
          (completeMethod)="filtrarObras($event)"
          field="nombre"
          [dropdown]="true"
          placeholder="Buscar obra"
          styleClass="w-full"
          (onSelect)="onFiltroChange()"
        ></p-autoComplete>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1 text-gray-700">Cliente</label>
        <p-autoComplete
          [(ngModel)]="filtrosDashboard.cliente"
          [suggestions]="filteredClientes"
          (completeMethod)="filtrarClientes($event)"
          field="nombre"
          [dropdown]="true"
          placeholder="Buscar cliente"
          styleClass="w-full"
          (onSelect)="onFiltroChange()"
        ></p-autoComplete>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1 text-gray-700">Proveedor</label>
        <p-autoComplete
          [(ngModel)]="filtrosDashboard.proveedor"
          [suggestions]="filteredProveedores"
          (completeMethod)="filtrarProveedores($event)"
          field="nombre"
          [dropdown]="true"
          placeholder="Buscar proveedor"
          styleClass="w-full"
          (onSelect)="onFiltroChange()"
        ></p-autoComplete>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1 text-gray-700">Rango de fechas</label>
        <p-datePicker
          fluid
          [(ngModel)]="filtrosDashboard.rangoFechas"
          selectionMode="range"
          appendTo="body"
          class="w-full"
          dateFormat="dd/mm/yy"
          placeholder="Seleccionar rango"
          (onSelect)="onFiltroChange()"
        ></p-datePicker>
      </div>

      <div class="flex flex-wrap gap-3 mt-4 justify-end">
        <button
          class="w-auto cursor-pointer px-4 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50"
          type="button"
          (click)="limpiarFiltrosDashboard()"
        >
          Limpiar
        </button>
      </div>
    </div>
  </div>

  <!-- ===================== WIDGETS DEL DASHBOARD ===================== -->

  <!-- KPIs de Cuenta Corriente (DEPRECATED: endpoint no disponible) -->
  <!-- <app-dashboard-kpis [filtros]="filtrosActivos"></app-dashboard-kpis> -->

  <!-- Tabla de Deudas (Clientes y Proveedores) -->
  <app-dashboard-deudas [filtros]="filtrosActivos"></app-dashboard-deudas>

  <!-- Tareas Antiguas y Movimientos Recientes (2 columnas) -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <app-dashboard-tareas></app-dashboard-tareas>
    <app-dashboard-movimientos [filtros]="filtrosActivos"></app-dashboard-movimientos>
  </div>

</div>

<!-- ===================== MODALES DE ACCESOS RÁPIDOS ===================== -->

<app-modal
  (closed)="cerrarMovimientoModal()"
  (confirmed)="guardarMovimientoRapido()"
  [title]="'Nuevo movimiento'"
  [visible]="showMovimientoModal"
>
  <div class="p-3 space-y-3">
    <label class="block text-sm font-medium mb-1 text-gray-700">Obra</label>
    <p-autoComplete
      [(ngModel)]="movimientoObra"
      [suggestions]="filteredObras"
      (completeMethod)="filtrarObras($event)"
      field="nombre"
      [dropdown]="true"
      placeholder="Buscar obra"
      styleClass="w-full"
      (onSelect)="onMovimientoObraSelect($event.value ?? $event)"
    ></p-autoComplete>

    <label class="block text-sm font-medium mb-1 text-gray-700">Tipo de asociado</label>
    <p-select
      [(ngModel)]="movimientoTipoEntidad"
      [options]="[
        { label: 'Cliente', value: 'CLIENTE' },
        { label: 'Proveedor', value: 'PROVEEDOR' }
      ]"
      placeholder="Seleccionar"
      styleClass="w-full"
      (onChange)="onMovimientoTipoEntidadChange()"
    ></p-select>

    @if (movimientoTipoEntidad === 'CLIENTE') {
      <label class="block text-sm font-medium mb-1 text-gray-700">Cliente</label>
      <p-autoComplete
        [(ngModel)]="movimientoCliente"
        [suggestions]="filteredMovimientoClientes"
        (completeMethod)="filtrarMovimientoClientes($event)"
        field="nombre"
        [dropdown]="true"
        placeholder="Cliente de la obra"
        styleClass="w-full"
        (onSelect)="onMovimientoClienteSelect($event.value ?? $event)"
      ></p-autoComplete>
    }

    @if (movimientoTipoEntidad === 'PROVEEDOR') {
      <label class="block text-sm font-medium mb-1 text-gray-700">Proveedor</label>
      <p-autoComplete
        [(ngModel)]="movimientoProveedor"
        [suggestions]="filteredMovimientoProveedores"
        (completeMethod)="filtrarMovimientoProveedores($event)"
        field="nombre"
        [dropdown]="true"
        placeholder="Proveedor de la obra"
        styleClass="w-full"
        (onSelect)="onMovimientoProveedorSelect($event.value ?? $event)"
      ></p-autoComplete>
    }

    <label class="block text-sm font-medium mb-1 text-gray-700">Condicion de pago/cobro</label>
    <div class="flex items-center gap-6">
      <div class="flex items-center gap-2">
        <p-radiobutton
          name="movFormaPago"
          inputId="movFormaParcial"
          value="PARCIAL"
          [(ngModel)]="movimientoForm.forma_pago"
          (ngModelChange)="onMovimientoFormaPagoChange($event)"
        ></p-radiobutton>
        <label for="movFormaParcial" class="text-sm text-gray-700">Parcial</label>
      </div>
      <div class="flex items-center gap-2">
        <p-radiobutton
          name="movFormaPago"
          inputId="movFormaTotal"
          value="TOTAL"
          [(ngModel)]="movimientoForm.forma_pago"
          (ngModelChange)="onMovimientoFormaPagoChange($event)"
        ></p-radiobutton>
        <label for="movFormaTotal" class="text-sm text-gray-700">Total</label>
      </div>
    </div>

    <label class="block text-sm font-medium mb-1 text-gray-700">Medio</label>
    <input
      type="text"
      pInputText
      [(ngModel)]="movimientoForm.medio_pago"
      class="w-full"
      placeholder="Ej: Transferencia"
    />

    <div class="flex gap-5">
      <div class="flex flex-col w-1/2">
        <label class="block text-sm font-medium mb-1 text-gray-700">Monto</label>
        <p-inputNumber
          [(ngModel)]="movimientoForm.monto"
          class="w-full"
          currency="ARS"
          locale="es-AR"
          mode="currency"
        ></p-inputNumber>
      </div>
      <div class="flex flex-col w-1/2">
        <label class="block text-sm font-medium mb-1 text-gray-700">Fecha</label>
        <p-datepicker
          [(ngModel)]="movimientoForm.fecha"
          appendTo="body"
          class="w-full"
          dateFormat="dd/mm/yy"
        ></p-datepicker>
      </div>
    </div>
  </div>
</app-modal>

<app-modal
  (closed)="cerrarTareaModal()"
  (confirmed)="guardarTareaRapida()"
  [title]="'Nueva tarea'"
  [visible]="showTareaModal"
>
  <div class="p-3 space-y-3">
    <label class="block text-sm font-medium mb-1 text-gray-700">Obra</label>
    <p-autoComplete
      [(ngModel)]="tareaObra"
      [suggestions]="filteredObras"
      (completeMethod)="filtrarObras($event)"
      field="nombre"
      [dropdown]="true"
      placeholder="Buscar obra"
      styleClass="w-full"
      (onSelect)="onTareaObraSelect($event.value ?? $event)"
    ></p-autoComplete>

    <label class="block text-sm font-medium mb-1 text-gray-700">Proveedor</label>
    <p-select
      [(ngModel)]="tareaProveedor"
      [options]="tareaProveedoresObra"
      optionLabel="nombre"
      placeholder="Proveedor de la obra"
      styleClass="w-full"
    ></p-select>

    <label class="block text-sm font-medium mb-1 text-gray-700">Nombre</label>
    <input pInputText type="text" [(ngModel)]="tareaForm.nombre" class="w-full" />

    <label class="block text-sm font-medium mb-1 text-gray-700">Nro de orden</label>
    <p-inputNumber
      [(ngModel)]="tareaForm.numero_orden"
      class="w-full"
      mode="decimal"
      [useGrouping]="false"
    ></p-inputNumber>

    <label class="block text-sm font-medium mb-1 text-gray-700">Descripcion</label>
    <textarea class="w-full border rounded p-2 text-sm" [(ngModel)]="tareaForm.descripcion" rows="3"></textarea>

    <label class="block text-sm font-medium mb-1 text-gray-700">Porcentaje</label>
    <p-inputNumber
      [(ngModel)]="tareaForm.porcentaje"
      class="w-full"
      mode="decimal"
      [min]="0"
      [max]="100"
    ></p-inputNumber>

    <label class="block text-sm font-medium mb-1 text-gray-700">Fecha inicio</label>
    <input pInputText type="date" [(ngModel)]="tareaForm.fecha_inicio" class="w-full" />
  </div>
</app-modal>

<app-modal
  (closed)="cerrarClienteModal()"
  (confirmed)="guardarClienteRapido()"
  [title]="'Nuevo cliente'"
  [visible]="showClienteModal"
>
  <div class="p-3 space-y-3">
    <label class="block text-sm font-medium mb-1 text-gray-700">Nombre</label>
    <input pInputText type="text" [(ngModel)]="clienteForm.nombre" class="w-full" />

    <label class="block text-sm font-medium mb-1 text-gray-700">Contacto</label>
    <input pInputText type="text" [(ngModel)]="clienteForm.contacto" class="w-full" />

    <label class="block text-sm font-medium mb-1 text-gray-700">Direccion</label>
    <input pInputText type="text" [(ngModel)]="clienteForm.direccion" class="w-full" />

    <label class="block text-sm font-medium mb-1 text-gray-700">CUIT</label>
    <input pInputText type="text" [(ngModel)]="clienteForm.cuit" class="w-full" />

    <label class="block text-sm font-medium mb-1 text-gray-700">Condicion IVA</label>
    <p-select
      [(ngModel)]="clienteForm.condicion_iva"
      [options]="ivaOptions"
      optionLabel="label"
      optionValue="name"
      placeholder="Seleccionar"
      styleClass="w-full"
    ></p-select>

    <label class="block text-sm font-medium mb-1 text-gray-700">Telefono</label>
    <input pInputText type="text" [(ngModel)]="clienteForm.telefono" class="w-full" />

    <label class="block text-sm font-medium mb-1 text-gray-700">Email</label>
    <input pInputText type="email" [(ngModel)]="clienteForm.email" class="w-full" />
  </div>
</app-modal>

<app-proveedor-quick-modal
  [visible]="showProveedorModal"
  [tiposProveedor]="tiposProveedor"
  [gremiosProveedor]="gremiosProveedor"
  [model]="proveedorForm"
  (closed)="cerrarProveedorModal()"
  (confirmed)="guardarProveedorRapido()"
  (tipoChange)="onTipoProveedorChange($event)"
  (gremioChange)="onGremioChange($event)"
></app-proveedor-quick-modal>

<app-modal
  (closed)="cerrarFacturaModal()"
  (confirmed)="guardarFacturaRapida()"
  [title]="'Nueva factura'"
  [visible]="showFacturaModal"
>
  <div class="p-3 space-y-3">
    <label class="block text-sm font-medium mb-1 text-gray-700">Cliente</label>
    <p-select
      [(ngModel)]="facturaForm.id_cliente"
      [options]="clientes"
      optionLabel="nombre"
      optionValue="id"
      placeholder="Seleccionar cliente"
      styleClass="w-full"
      (onChange)="onFacturaClienteChange()"
    ></p-select>

    <label class="block text-sm font-medium mb-1 text-gray-700">Obra</label>
    <p-select
      [(ngModel)]="facturaForm.id_obra"
      [options]="facturaObrasFiltradas"
      optionLabel="nombre"
      optionValue="id"
      placeholder="Seleccionar obra"
      styleClass="w-full"
      (onChange)="onFacturaObraChange()"
    ></p-select>

    <div class="flex gap-5">
      <div class="flex flex-col w-1/2">
        <label class="block text-sm font-medium mb-1 text-gray-700">Fecha</label>
        <p-datepicker
          [(ngModel)]="facturaForm.fecha"
          appendTo="body"
          class="w-full"
          dateFormat="dd/mm/yy"
        ></p-datepicker>
      </div>
      <div class="flex flex-col w-1/2">
        <label class="block text-sm font-medium mb-1 text-gray-700">Monto</label>
        <p-inputNumber
          [(ngModel)]="facturaForm.monto"
          class="w-full"
          mode="decimal"
          locale="es-AR"
        ></p-inputNumber>
      </div>
    </div>

    <label class="block text-sm font-medium mb-1 text-gray-700">Estado</label>
    <p-select
      [(ngModel)]="facturaForm.estado"
      [options]="[
        { label: 'Emitida', value: 'EMITIDA' },
        { label: 'Cobrada', value: 'COBRADA' }
      ]"
      optionLabel="label"
      optionValue="value"
      placeholder="Seleccionar estado"
      styleClass="w-full"
    ></p-select>

    <label class="block text-sm font-medium mb-1 text-gray-700">Descripcion</label>
    <p-editor
      [(ngModel)]="facturaForm.descripcion"
      [style]="{ height: '160px' }"
    ></p-editor>

    <label class="block text-sm font-medium mb-1 text-gray-700">Adjuntar factura (opcional)</label>
    <p-fileUpload
      mode="basic"
      chooseLabel="Seleccionar archivo"
      chooseIcon="pi pi-upload"
      accept=".jpg,.jpeg,.png,.pdf"
      [auto]="false"
      (onSelect)="onFacturaFileSelected($event)"
    ></p-fileUpload>
    @if (facturaFile) {
      <div class="flex items-center gap-2 text-sm text-gray-700">
        <span>{{ facturaFile.name }}</span>
        <button type="button" class="text-red-500 hover:text-red-700" (click)="quitarFacturaArchivo()">x</button>
      </div>
    }
  </div>
</app-modal>
