<p-toast position="bottom-right"></p-toast>
<p-confirmDialog></p-confirmDialog>

@switch (true) {
  @case (currentRoute === '/movimientos') {
    <app-layout-header type="list" title="Movimientos" subtitle="Gestión de cobros y pagos">
      <p-button
        header-actions
        label="Nuevo Movimiento"
        icon="pi pi-plus"
        (click)="abrirNuevoMovimiento()"
        class="btn-mobile-icon"
        styleClass="p-button">
      </p-button>
    </app-layout-header>
  }
  @default {
    <div class="p-4">
      <h1 class="font-poppins text-3xl font-semibold text-gray-800 m-0">Movimientos</h1>
    </div>
  }
}

<div class="p-5 bg-gray-50">
  <router-outlet></router-outlet>
</div>
