<p-toast position="bottom-right"></p-toast>
<p-confirmDialog></p-confirmDialog>

@switch (true) {
  @case (currentRoute === '/obras') {
    <app-layout-header type="list" title="Obras" subtitle="Resumen y gestión de todas las obras">
      <p-button
        header-actions
        label="Nueva Obra"
        icon="pi pi-plus"
        routerLink="/obras/nueva"
        class="btn-mobile-icon"
        styleClass="p-button">
      </p-button>
    </app-layout-header>
  }

  @case (currentRoute === '/obras/nueva') {
    <app-layout-header type="create" title="Nueva Obra" subtitle="Registrar un nuevo proyecto en el sistema">
      <p-button
        header-actions
        label="Volver"
        icon="pi pi-arrow-left"
        appBackButton
        fallback="/obras"
        styleClass="p-button">
      </p-button>
    </app-layout-header>
  }

  @case (currentRoute.includes('/obras/editar')) {
    <app-layout-header type="edit" title="Editar Obra" subtitle="Actualizar datos y costos del proyecto">
      <p-button
        header-actions
        label="Volver"
        icon="pi pi-arrow-left"
        appBackButton
        fallback="/obras"
        styleClass="p-button">
      </p-button>
    </app-layout-header>
  }

  @case (isDetail()) {
    @if (obra) {
      <app-layout-header type="detail" [title]="obra.nombre" [subtitle]="obra.direccion">
        <div header-actions class="flex items-center gap-3">
          <p-button
            icon="pi pi-pencil"
            styleClass="header-action-edit"
            [routerLink]="['/obras/editar', obra.id]"
            pTooltip="Editar obra"
            tooltipPosition="top"
            [text]="true">
          </p-button>
          <p-button
            [icon]="obra.activo ? 'pi pi-ban' : 'pi pi-check'"
            [styleClass]="obra.activo ? 'header-action-toggle active' : 'header-action-toggle inactive'"
            (onClick)="toggleActivo()"
            [pTooltip]="obra.activo ? 'Desactivar obra' : 'Activar obra'"
            tooltipPosition="top"
            [text]="true">
          </p-button>
          <p-button
            label="Volver"
            icon="pi pi-arrow-left"
            appBackButton
            fallback="/obras"
            styleClass="p-button">
          </p-button>
        </div>
      </app-layout-header>
    } @else {
      <div class="relative bg-gradient-to-r from-gray-300 to-gray-400 w-full shadow-lg p-8 animate-pulse">
        <div class="space-y-3">
          <div class="h-8 bg-white/30 rounded w-1/3"></div>
          <div class="h-4 bg-white/30 rounded w-1/4"></div>
        </div>
      </div>
    }
  }

  @default {
    <div class="p-4">
      <h1 class="font-poppins text-3xl font-semibold text-gray-800 m-0">Gestión de Obras</h1>
    </div>
  }
}

<div class="p-5 bg-gray-50">
  <router-outlet></router-outlet>
</div>
