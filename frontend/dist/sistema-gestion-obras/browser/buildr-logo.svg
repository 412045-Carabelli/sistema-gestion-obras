<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 160" width="660" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&amp;display=swap');
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="660" height="160" fill="#0e0e0e" rx="12"/>

  <!-- ICON box -->
  <rect x="28" y="20" width="118" height="118" rx="22" fill="#161616"/>

  <!-- "b" centrada en el box -->
  <text
    x="87"
    y="106"
    text-anchor="middle"
    font-family="'Syne', 'Helvetica Neue', sans-serif"
    font-weight="800"
    font-size="90"
    fill="#F0F0F0"
  >b</text>

  <!-- Punto lima: un poquito más cerca de la b, glow reducido -->
  <circle cx="108" cy="42" r="7" fill="#E8FF47" filter="url(#glow)"/>

  <!-- Separador vertical -->
  <line x1="172" y1="32" x2="172" y2="128" stroke="#1e1e1e" stroke-width="1.5"/>

  <!-- WORDMARK -->
  <text
    x="192"
    y="97"
    font-family="'Syne', 'Helvetica Neue', sans-serif"
    font-weight="800"
    font-size="64"
    letter-spacing="-3"
  ><tspan fill="#F0F0F0">build</tspan><tspan fill="#E8FF47">r</tspan></text>

  <!-- Tagline -->
  <text
    x="194"
    y="122"
    font-family="'Syne', 'Helvetica Neue', sans-serif"
    font-weight="400"
    font-size="11"
    letter-spacing="4"
    fill="#3a3a3a"
  >THE OS FOR CONSTRUCTION</text>

  <!-- Línea sutil bajo wordmark -->
  <line x1="192" y1="105" x2="488" y2="105" stroke="#E8FF47" stroke-width="1" opacity="0.12" stroke-linecap="round"/>
</svg>
