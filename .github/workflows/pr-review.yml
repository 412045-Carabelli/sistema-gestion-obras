name: PR Review - Code Quality & Security

on:
  pull_request:
    branches: [ 'develop' ]
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read
  pull-requests: write

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: |
            backend/**
            frontend/**
            db/migration/**
            db/migrador/**

      - name: Analyze Spring Boot code
        if: steps.changed-files.outputs.any_changed == 'true'
        id: backend-check
        run: |
          ISSUES=""

          # Check for SQL injection vulnerabilities in backend
          if find backend -name "*.java" -type f | xargs grep -l "\"SELECT.*\" +" 2>/dev/null | grep -q .; then
            ISSUES="$ISSUES\n❌ **SQL Injection Risk:** Encontradas consultas SQL concatenadas en código Java. Usa PreparedStatement o parametrizadas."
          fi

          # Check for hardcoded passwords
          if find backend -name "*.java" -o -name "*.yml" -o -name "*.yaml" | xargs grep -i "password\s*=\s*['\"][^'\"]*['\"]" 2>/dev/null | grep -v "sa\|test\|example" | grep -q .; then
            ISSUES="$ISSUES\n❌ **Hardcoded Credentials:** Contraseñas encontradas en el código. Usa variables de entorno."
          fi

          # Check for missing @Transactional on service methods that modify data
          if find backend -name "*Service.java" -type f -exec grep -L "@Transactional" {} \; | grep -q .; then
            ISSUES="$ISSUES\n⚠️ **Missing @Transactional:** Algunos servicios no tienen @Transactional. Revisa métodos que modifican datos."
          fi

          # Check for NullPointerException risks
          if find backend -name "*.java" -type f | xargs grep -l "\.get()" 2>/dev/null | grep -q .; then
            ISSUES="$ISSUES\n⚠️ **Null Safety:** Usa Optional.orElse() en lugar de .get() directo para evitar NPE."
          fi

          # Check for missing Lombok annotations
          if find backend -name "*.java" -type f | xargs grep -B5 "public.*get" 2>/dev/null | grep -v "@Data\|@Getter\|@Setter" | grep -q "public"; then
            ISSUES="$ISSUES\n💡 **Lombok Suggestion:** Considera usar @Data, @Getter, @Setter para reducir boilerplate."
          fi

          # Check for raw types (untyped generics)
          if find backend -name "*.java" -type f | xargs grep -E "List<\s*\?>|Map<\s*\?>|Set<\s*\?>" 2>/dev/null | grep -q .; then
            ISSUES="$ISSUES\n⚠️ **Raw Types:** Evita usar tipos genéricos sin especificar. Usa <String>, <Long>, etc."
          fi

          # Check for broad exception catching
          if find backend -name "*.java" -type f | xargs grep "catch (Exception" 2>/dev/null | grep -q .; then
            ISSUES="$ISSUES\n⚠️ **Broad Exception Catching:** Evita catch(Exception). Especifica la excepción exacta."
          fi

          # Check for code duplication patterns
          LONG_METHODS=$(find backend -name "*.java" -type f -exec grep -l "^\s*public.*{$" {} \; | xargs wc -l | awk '$1 > 50 {print $2}' | wc -l)
          if [ "$LONG_METHODS" -gt 0 ]; then
            ISSUES="$ISSUES\n💡 **Long Methods:** Detectados métodos largos (>50 líneas). Considera refactorizar en métodos más pequeños."
          fi

          # Check for missing @Slf4j or logger initialization
          if find backend -name "*.java" -type f | xargs grep -L "@Slf4j\|private.*Logger" 2>/dev/null | grep -q "public class"; then
            ISSUES="$ISSUES\n💡 **Logging:** Considera agregar logging con @Slf4j para debugging."
          fi

          # Check for unused imports
          if find backend -name "*.java" -type f -exec grep -l "^import.*;\s*$" {} \; 2>/dev/null | grep -q .; then
            ISSUES="$ISSUES\n💡 **Clean Code:** Revisa imports innecesarios o no utilizados."
          fi

          # Check for String concatenation in loops
          if find backend -name "*.java" -type f | xargs grep -B2 "for.*{" | grep "+=" 2>/dev/null | grep -q .; then
            ISSUES="$ISSUES\n⚠️ **Performance:** Evita concatenar strings en loops. Usa StringBuilder."
          fi

          echo "backend_issues<<EOF" >> $GITHUB_OUTPUT
          echo -e "$ISSUES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Analyze Angular code
        if: steps.changed-files.outputs.any_changed == 'true'
        id: frontend-check
        run: |
          ISSUES=""

          # Check for console.log in production code
          if find frontend -name "*.ts" -type f ! -path "*/node_modules/*" | xargs grep -l "console\.log" 2>/dev/null | grep -q .; then
            ISSUES="$ISSUES\n⚠️ **Console.log:** Encontrados console.log en código. Remover antes de producción."
          fi

          # Check for missing async/await error handling
          if find frontend -name "*.ts" -type f ! -path "*/node_modules/*" | xargs grep -l "\.subscribe(" 2>/dev/null | grep -q .; then
            ISSUES="$ISSUES\n⚠️ **Subscription Management:** Asegúrate de desuscribirse en onDestroy para evitar memory leaks."
          fi

          # Check for any 'as any' type assertions
          if find frontend -name "*.ts" -type f ! -path "*/node_modules/*" | xargs grep -l "as any" 2>/dev/null | grep -q .; then
            ISSUES="$ISSUES\n❌ **Type Safety:** Evita 'as any'. Usa tipos correctos en lugar de type assertions."
          fi

          # Check for missing OnDestroy implementation
          if find frontend -name "*.component.ts" -type f ! -path "*/node_modules/*" | xargs grep -l "\.subscribe(" 2>/dev/null | xargs grep -L "OnDestroy\|ngOnDestroy" 2>/dev/null | grep -q .; then
            ISSUES="$ISSUES\n⚠️ **Missing OnDestroy:** Componentes con subscriptions deben implementar OnDestroy y desuscribirse."
          fi

          # Check for missing Change Detection strategy
          COMPONENTS=$(find frontend -name "*.component.ts" -type f ! -path "*/node_modules/*" | wc -l)
          if [ "$COMPONENTS" -gt 5 ]; then
            ISSUES="$ISSUES\n💡 **Change Detection:** Considera usar ChangeDetectionStrategy.OnPush para mejor performance en componentes."
          fi

          # Check for ngFor without trackBy
          if find frontend -name "*.html" -type f | xargs grep "*ngFor" 2>/dev/null | grep -v "trackBy" | grep -q .; then
            ISSUES="$ISSUES\n⚠️ **Performance:** Agrega trackBy en *ngFor para mejor rendimiento en listas grandes."
          fi

          # Check for *ngIf with *ngFor (redundant)
          if find frontend -name "*.html" -type f | xargs grep -l "*ngIf.*\*ngFor\|*ngFor.*\*ngIf" 2>/dev/null | grep -q .; then
            ISSUES="$ISSUES\n💡 **Template Optimization:** Evita usar *ngIf y *ngFor en el mismo elemento. Separa la lógica."
          fi

          # Check for inline styles
          if find frontend -name "*.html" -type f | xargs grep "style=" 2>/dev/null | grep -q .; then
            ISSUES="$ISSUES\n💡 **Code Organization:** Evita estilos inline en HTML. Usa CSS en componentes o archivos .scss."
          fi

          # Check for ngOn hooks in templates
          if find frontend -name "*.html" -type f | xargs grep "(ngOnInit)\|(ngOnDestroy)\|(ngOnChanges)" 2>/dev/null | grep -q .; then
            ISSUES="$ISSUES\n⚠️ **Logic in Templates:** No llames lifecycle hooks desde templates. Usa métodos normales."
          fi

          # Check for missing @Input/@Output documentation
          if find frontend -name "*.ts" -type f ! -path "*/node_modules/*" | xargs grep "@Input\|@Output" 2>/dev/null | grep -v "//" | grep -q .; then
            ISSUES="$ISSUES\n💡 **Documentation:** Documenta @Input y @Output con comentarios JSDoc."
          fi

          # Check for large components
          LARGE_COMPONENTS=$(find frontend -name "*.component.ts" -type f ! -path "*/node_modules/*" -exec wc -l {} \; | awk '$1 > 200 {print $2}' | wc -l)
          if [ "$LARGE_COMPONENTS" -gt 0 ]; then
            ISSUES="$ISSUES\n💡 **Component Size:** Detectados componentes grandes (>200 líneas). Considera dividir en componentes más pequeños."
          fi

          # Check for async pipe usage
          if find frontend -name "*.html" -type f | xargs grep "\.subscribe" 2>/dev/null | grep -q .; then
            ISSUES="$ISSUES\n💡 **Async Pipe:** Considera usar async pipe en templates en lugar de .subscribe en el componente."
          fi

          # Check for missing error handling in HTTP calls
          if find frontend -name "*.ts" -type f ! -path "*/node_modules/*" | xargs grep "http\.\(get\|post\|put\|delete\)" 2>/dev/null | grep -v "catchError\|catch" | grep -q .; then
            ISSUES="$ISSUES\n⚠️ **Error Handling:** Agrega catchError() en llamadas HTTP para manejar errores."
          fi

          echo "frontend_issues<<EOF" >> $GITHUB_OUTPUT
          echo -e "$ISSUES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check migrations
        if: steps.changed-files.outputs.any_changed == 'true'
        id: migration-check
        run: |
          ISSUES=""

          # Check if SQL files follow naming convention
          for file in $(find backend -path "*/db/migration/*.sql" -type f 2>/dev/null); do
            filename=$(basename "$file")
            if ! [[ $filename =~ ^V[0-9]+__[a-z_]+\.sql$ ]]; then
              ISSUES="$ISSUES\n❌ **Migration Naming:** $filename no sigue patrón V{numero}__{descripcion}.sql"
            fi
          done

          # Check for unsafe SQL operations
          for file in $(find backend -path "*/db/migration/*.sql" -type f 2>/dev/null); do
            if grep -i "DROP TABLE\|DELETE FROM\|TRUNCATE" "$file" 2>/dev/null | grep -q .; then
              ISSUES="$ISSUES\n⚠️ **Destructive SQL:** $(basename $file) contiene operaciones destructivas. Asegúrate de que sea intencional."
            fi
          done

          echo "migration_issues<<EOF" >> $GITHUB_OUTPUT
          echo -e "$ISSUES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Security checks
        id: security-check
        run: |
          ISSUES=""

          # Check for exposed secrets patterns
          if git diff origin/develop...HEAD | grep -iE "api[_-]?key|secret|token|password" 2>/dev/null | grep -q .; then
            ISSUES="$ISSUES\n🔐 **Exposed Secrets:** Detectados patrones de secretos en diff. Verifica si son reales."
          fi

          # Check for CORS misconfiguration
          if find backend -name "*.java" -type f | xargs grep -l "allowedOrigins\s*=\s*{\"\\*\"" 2>/dev/null | grep -q .; then
            ISSUES="$ISSUES\n❌ **CORS Misconfiguration:** allowedOrigins = \"*\" es inseguro. Especifica dominios reales."
          fi

          echo "security_issues<<EOF" >> $GITHUB_OUTPUT
          echo -e "$ISSUES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const backend = `${{ steps.backend-check.outputs.backend_issues }}`.trim();
            const frontend = `${{ steps.frontend-check.outputs.frontend_issues }}`.trim();
            const migration = `${{ steps.migration-check.outputs.migration_issues }}`.trim();
            const security = `${{ steps.security-check.outputs.security_issues }}`.trim();

            let comment = `## 🔍 Code Review - Buenas Prácticas & Seguridad\n\n`;

            let hasIssues = false;

            if (backend) {
              comment += `### Backend (Spring Boot)\n${backend}\n\n`;
              hasIssues = true;
            } else {
              comment += `### Backend (Spring Boot)\n✅ Sin problemas detectados\n\n`;
            }

            if (frontend) {
              comment += `### Frontend (Angular)\n${frontend}\n\n`;
              hasIssues = true;
            } else {
              comment += `### Frontend (Angular)\n✅ Sin problemas detectados\n\n`;
            }

            if (migration) {
              comment += `### Migraciones BD\n${migration}\n\n`;
              hasIssues = true;
            } else {
              comment += `### Migraciones BD\n✅ Sin problemas detectados\n\n`;
            }

            if (security) {
              comment += `### Seguridad\n${security}\n\n`;
              hasIssues = true;
            } else {
              comment += `### Seguridad\n✅ Sin problemas detectados\n\n`;
            }

            comment += `---\n🤖 Revisión automática con Claude Code`;

            if (hasIssues) {
              comment = `### ⚠️ Se encontraron problemas\n\n${comment}`;
            } else {
              comment = `### ✅ Todo OK\n\n${comment}`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
