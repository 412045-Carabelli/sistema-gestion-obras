name: Publish img to GHCR

on:
  push:
    tags: [ 'v*.*.*', '*.*.*' ]
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build all services'
        required: false
        default: 'false'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      tag: ${{ steps.set-tag.outputs.tag }}
      force_build: ${{ github.event.inputs.force_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect modified services
        id: set-matrix
        run: |
          ALL='["api-gateway","obras-service","clientes-service","proveedores-service","reportes-service","transacciones-service","documentos-service","agendas-service","auth-service","frontend","bot-whatsapp"]'

          if [[ "${{ github.event.inputs.force_build }}" == "true" ]] || [[ "${{ github.ref_type }}" == "tag" ]]; then
            SERVICES="$ALL"
          else
            CHANGED=$(git diff --name-only HEAD~1..HEAD || git diff --name-only HEAD)
            SERVICES='[]'

            echo "$CHANGED" | grep -q "^backend1.0/api-gateway/"          && SERVICES=$(echo $SERVICES | jq '. += ["api-gateway"]')          || true
            echo "$CHANGED" | grep -q "^backend1.0/obras-service/"         && SERVICES=$(echo $SERVICES | jq '. += ["obras-service"]')         || true
            echo "$CHANGED" | grep -q "^backend1.0/clientes-service/"      && SERVICES=$(echo $SERVICES | jq '. += ["clientes-service"]')      || true
            echo "$CHANGED" | grep -q "^backend1.0/proveedores-service/"   && SERVICES=$(echo $SERVICES | jq '. += ["proveedores-service"]')   || true
            echo "$CHANGED" | grep -q "^backend1.0/reportes-service/"      && SERVICES=$(echo $SERVICES | jq '. += ["reportes-service"]')      || true
            echo "$CHANGED" | grep -q "^backend1.0/transacciones-service/" && SERVICES=$(echo $SERVICES | jq '. += ["transacciones-service"]') || true
            echo "$CHANGED" | grep -q "^backend1.0/documentos-service/"    && SERVICES=$(echo $SERVICES | jq '. += ["documentos-service"]')    || true
            echo "$CHANGED" | grep -q "^backend1.0/agendas-service/"       && SERVICES=$(echo $SERVICES | jq '. += ["agendas-service"]')       || true
            echo "$CHANGED" | grep -q "^backend1.0/auth-service/"          && SERVICES=$(echo $SERVICES | jq '. += ["auth-service"]')          || true
            echo "$CHANGED" | grep -q "^frontend/"                         && SERVICES=$(echo $SERVICES | jq '. += ["frontend"]')              || true
            echo "$CHANGED" | grep -q "^bot-whatsapp/"                     && SERVICES=$(echo $SERVICES | jq '. += ["bot-whatsapp"]')          || true
            # common cambia → rebuild todo el backend
            echo "$CHANGED" | grep -q "^backend1.0/common/" && \
              SERVICES=$(echo $SERVICES | jq '. += ["api-gateway","obras-service","clientes-service","proveedores-service","reportes-service","transacciones-service","documentos-service","agendas-service","auth-service"] | unique') || true

            # Fallback: nada detectado en código → no buildear nada
            # (cambios en .github/, docker-compose, docs no requieren rebuild de imágenes)
            if [[ "$SERVICES" == "[]" ]]; then
              echo "No service code changed, skipping all builds"
            fi
          fi

          # GitHub no acepta matrix vacío — usar sentinel "none" para saltear
          if [[ "$SERVICES" == "[]" ]]; then
            SERVICES='["none"]'
          fi
          echo "matrix={\"service\":$(echo $SERVICES)}" >> $GITHUB_OUTPUT
          echo "Detected services: $SERVICES"

      - name: Set version tag
        id: set-tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF##refs/tags/}"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            TAG="latest"
          else
            TAG="desa"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Branch/tag resolved to image tag: ${TAG}"

  pre-checks:
    needs: detect-changes
    if: ${{ !contains(needs.detect-changes.outputs.matrix, '"none"') }}
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17 (backend only)
        if: matrix.service != 'frontend' && matrix.service != 'bot-whatsapp'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven (backend only)
        if: matrix.service != 'frontend' && matrix.service != 'bot-whatsapp'
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ matrix.service }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-${{ matrix.service }}-
            ${{ runner.os }}-maven-

      - name: Install common module (backend only)
        if: matrix.service != 'frontend' && matrix.service != 'bot-whatsapp'
        run: |
          cd backend1.0/common
          mvn -B -DskipTests install

      - name: Run tests & lint (${{ matrix.service }})
        if: matrix.service != 'frontend' && matrix.service != 'bot-whatsapp'
        run: |
          echo "::group::Testing ${{ matrix.service }}"
          cd backend1.0/${{ matrix.service }}
          mvn -B test 2>&1 | tail -50
          echo "::endgroup::"

      - name: Node setup (frontend only)
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: '19'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Run linting (frontend only)
        if: matrix.service == 'frontend'
        continue-on-error: true
        run: |
          cd frontend
          npm ci --prefer-offline --no-audit
          npm run lint 2>&1 | tail -50 || echo "⚠️  Lint warnings found but continuing"

  build-and-push:
    needs: [detect-changes, pre-checks]
    if: ${{ !contains(needs.detect-changes.outputs.matrix, '"none"') }}
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build context
        id: context
        run: |
          case "${{ matrix.service }}" in
            frontend)      echo "path=frontend" >> $GITHUB_OUTPUT; echo "dockerfile=frontend/Dockerfile" >> $GITHUB_OUTPUT ;;
            bot-whatsapp)  echo "path=bot-whatsapp" >> $GITHUB_OUTPUT; echo "dockerfile=bot-whatsapp/Dockerfile" >> $GITHUB_OUTPUT ;;
            *)             echo "path=." >> $GITHUB_OUTPUT; echo "dockerfile=backend1.0/${{ matrix.service }}/Dockerfile" >> $GITHUB_OUTPUT ;;
          esac

      - name: Normalize owner to lowercase
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.context.outputs.path }}
          file: ${{ steps.context.outputs.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/sgo-${{ matrix.service }}:${{ needs.detect-changes.outputs.tag }}
            ${{ needs.detect-changes.outputs.tag != 'latest' && needs.detect-changes.outputs.tag != 'desa' && format('{0}/{1}/sgo-{2}:latest', env.REGISTRY, steps.owner.outputs.owner, matrix.service) || '' }}

  publish-status:
    if: always()
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Publish summary
        run: |
          if [[ "${{ needs.build-and-push.result }}" == "success" ]]; then
            echo "✅ All containers published to GHCR"
          elif [[ "${{ needs.build-and-push.result }}" == "failure" ]]; then
            echo "❌ Some services failed (check above)"
            exit 1
          else
            echo "⏭️  Skipped (no changes detected)"
          fi
