groups:
  - name: sgo-alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service down ({{ $labels.job }})"
          description: "Target {{ $labels.job }} is down for more than 2 minutes."

      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, application)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency ({{ $labels.application }})"
          description: "p95 latency > 1s for 5 minutes."
