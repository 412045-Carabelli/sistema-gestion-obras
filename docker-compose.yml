# =======================
# Docker Compose file for the SGO microservices stack (build local).
# All services communicate through the internal bridge network `sgo_backend`.
# =======================
services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sgo_sqlserver_v2
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Express
      - MSSQL_MEMORY_LIMIT_MB=1536
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./db/sqlserver-init:/init
      - backup_data:/backups
    entrypoint: ["/bin/bash", "/init/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost",
             "-U", "sa", "-P", "${DB_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1792M
    networks:
      - sgo_backend

  migrador:
    build: ./db/migrador
    container_name: sgo_migrador_v2
    environment:
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./data/obras:/data/obras
      - ./data/clientes:/data/clientes
      - ./data/proveedores:/data/proveedores
      - ./data/reportes:/data/reportes
      - ./data/transacciones:/data/transacciones
      - ./data/documentos:/data/documentos
      - migration_flags:/data/migration
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: "no"
    networks:
      - sgo_backend

  obras-service:
    build: ./backend1.0/obras-service
    container_name: obras_service_local_v2
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_obras;encrypt=false;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.SQLServerDialect
      - SPRING_FLYWAY_ENABLED=true
      - JAVA_OPTS=-Xms64m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - sgo_backend

  clientes-service:
    build: ./backend1.0/clientes-service
    container_name: clientes_service_local_v2
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_clientes;encrypt=false;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.SQLServerDialect
      - SPRING_FLYWAY_ENABLED=true
      - JAVA_OPTS=-Xms64m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - sgo_backend

  proveedores-service:
    build: ./backend1.0/proveedores-service
    container_name: proveedores_service_local_v2
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_proveedores;encrypt=false;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.SQLServerDialect
      - SPRING_FLYWAY_ENABLED=true
      - JAVA_OPTS=-Xms64m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - sgo_backend

  documentos-service:
    build: ./backend1.0/documentos-service
    container_name: documentos_service_local_v2
    ports:
      - "8087:8087"
    volumes:
      - ./data/uploads:/app/uploads
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_documentos;encrypt=false;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.SQLServerDialect
      - SPRING_FLYWAY_ENABLED=true
      - MINIO_ENABLED=true
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=documentos
      - JAVA_OPTS=-Xms64m -Xmx192m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    depends_on:
      sqlserver:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - sgo_backend

  transacciones-service:
    build: ./backend1.0/transacciones-service
    container_name: transacciones_service_local_v2
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_transacciones;encrypt=false;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.SQLServerDialect
      - SPRING_FLYWAY_ENABLED=true
      - JAVA_OPTS=-Xms128m -Xmx384m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - sgo_backend

  agendas-service:
    build: ./backend1.0/agendas-service
    container_name: agendas_service_local_v2
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_agendas;encrypt=false;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.SQLServerDialect
      - SPRING_FLYWAY_ENABLED=true
      - JAVA_OPTS=-Xms64m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - sgo_backend

  reportes-service:
    build: ./backend1.0/reportes-service
    container_name: reportes_service_local_v2
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8084
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_reportes;encrypt=false;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.SQLServerDialect
      - SPRING_FLYWAY_ENABLED=true
      - SERVICIOS_OBRAS_BASE_URL=http://obras-service:8081
      - SERVICIOS_CLIENTES_BASE_URL=http://clientes-service:8082
      - SERVICIOS_PROVEEDORES_BASE_URL=http://proveedores-service:8083
      - SERVICIOS_TRANSACCIONES_BASE_URL=http://transacciones-service:8086
      - SERVICIOS_FACTURAS_BASE_URL=http://transacciones-service:8086
      - JAVA_OPTS=-Xms128m -Xmx384m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - sgo_backend

  auth-service:
    build: ./backend1.0/auth-service
    container_name: auth_service_local_v2
    ports:
      - "8089:8089"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_auth;encrypt=false;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.SQLServerDialect
      - SPRING_FLYWAY_ENABLED=true
      - JWT_SECRET=${JWT_SECRET}
      - JAVA_OPTS=-Xms64m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - sgo_backend

  api-gateway:
    build:
      context: ./backend1.0/api-gateway
      dockerfile: Dockerfile
    container_name: api_gateway_service_local_v2
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVICES_OBRAS_URL=http://obras-service:8081/api/obras
      - SERVICES_CLIENTES_URL=http://clientes-service:8082/api/clientes
      - SERVICES_PROVEEDORES_URL=http://proveedores-service:8083/api/proveedores
      - SERVICES_DOCUMENTOS_URL=http://documentos-service:8087/api/documentos
      - SERVICES_TRANSACCIONES_URL=http://transacciones-service:8086/api/transacciones
      - SERVICES_AGENDAS_URL=http://agendas-service:8085/api/agendas
      - SERVICES_OBRAS_TAREAS_URL=http://obras-service:8081/api/obras/tareas
      - SERVICES_AGENDAS_TAREAS_URL=http://agendas-service:8085/api/agenda/tareas
      - SERVICES_REPORTES_URL=http://reportes-service:8084/api/reportes
      - JWT_SECRET=${JWT_SECRET}
      - JAVA_OPTS=-Xms64m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    # depends_on:
    #   obras-service:
    #     condition: service_started
    #   clientes-service:
    #     condition: service_started
    #   proveedores-service:
    #     condition: service_started
    #   documentos-service:
    #     condition: service_started
    #   transacciones-service:
    #     condition: service_started
    #   agendas-service:
    #     condition: service_started
    #   reportes-service:
    #     condition: service_started
    #   migrador:
    #     condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - sgo_backend

  frontend:
    build: ./frontend
    container_name: obras_frontend_v2
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    restart: unless-stopped
    networks:
      - sgo_backend

  minio:
    image: minio/minio:latest
    container_name: minio_v2
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    restart: unless-stopped
    networks:
      - sgo_backend

  backup:
    build: ./backup
    container_name: sgo_backup
    environment:
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - backup_data:/backups
      - ./data/minio:/minio-data:ro
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - sgo_backend

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - TZ=America/Argentina/Córdoba
      # Configuración de SQL Server
      - DB_TYPE=mssql
      - DB_MSSQL_HOST=sqlserver
      - DB_MSSQL_PORT=1433
      - DB_MSSQL_DATABASE=n8n
      - DB_MSSQL_USER=sa
      - DB_MSSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - n8n_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  waha:
    image: devlikeapro/waha
    container_name: sgo_waha
    ports:
      - "3000:3000"
    volumes:
      - waha_data:/app/.waha/sessions
    environment:
      - WHATSAPP_DEFAULT_ENGINE=NOWEB
      - WAHA_DASHBOARD_ENABLED=true
      - WAHA_DASHBOARD_USERNAME=${WAHA_USER:-admin}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_PASSWORD:-admin123}
      - WHATSAPP_API_KEY=${WAHA_API_KEY:-sgo2026}
      - WHATSAPP_HOOK_URL=http://bot-whatsapp:4000/webhook
      - WHATSAPP_HOOK_EVENTS=message
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - sgo_backend

  bot-whatsapp:
    build: ./bot-whatsapp
    container_name: sgo_bot_whatsapp
    ports:
      - "4000:4000"
    environment:
      - WAHA_URL=http://waha:3000
      - WAHA_API_KEY=${WAHA_API_KEY:-sgo2026}
      - API_GATEWAY_URL=http://host.docker.internal:8080
      - WAHA_SESSION=default
      - PORT=4000
      # Números autorizados separados por coma (sin +, ej: 5491112345678)
      - NUMEROS_AUTORIZADOS=${BOT_NUMEROS_AUTORIZADOS:-}
      # Números que reciben notificaciones diarias
      - NUMEROS_NOTIFICACIONES=${BOT_NUMEROS_NOTIFICACIONES:-}
      - DIAS_VENCIMIENTO=${BOT_DIAS_VENCIMIENTO:-7}
      # Cron: default 8am Argentina (UTC-3 = 11:00 UTC)
      - CRON_NOTIFICACIONES=${BOT_CRON_NOTIFICACIONES:-0 11 * * *}
    depends_on:
      - waha
      - api-gateway
    restart: unless-stopped
    networks:
      - sgo_backend

networks:
  sgo_backend:
    driver: bridge
  n8n_network:
    driver: bridge

volumes:
  sqlserver_data:
  migration_flags:
  n8n_data:
  waha_data:
  backup_data:
