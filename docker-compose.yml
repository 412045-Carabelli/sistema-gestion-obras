# =======================
# Docker Compose file for the SGO microservices stack (build local).
# All services communicate through the internal bridge network `sgo_backend`.
# =======================
services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sgo_sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD:-SgoAdmin2024!}
      - MSSQL_PID=Express
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./db/sqlserver-init:/init
    entrypoint: ["/bin/bash", "/init/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost",
             "-U", "sa", "-P", "${DB_PASSWORD:-SgoAdmin2024!}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    networks:
      - sgo_backend

  migrador:
    build: ./db/migrador
    container_name: sgo_migrador
    environment:
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD:-SgoAdmin2024!}
    volumes:
      - ./data/obras:/data/obras
      - ./data/clientes:/data/clientes
      - ./data/proveedores:/data/proveedores
      - ./data/reportes:/data/reportes
      - ./data/transacciones:/data/transacciones
      - ./data/documentos:/data/documentos
      - migration_flags:/data/migration
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: "no"
    networks:
      - sgo_backend

  obras-service:
    build: ./backend1.0/obras-service
    container_name: obras_service_local
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD:-SgoAdmin2024!}
    depends_on:
      sqlserver:
        condition: service_healthy
      migrador:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - sgo_backend

  clientes-service:
    build: ./backend1.0/clientes-service
    container_name: clientes_service_local
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD:-SgoAdmin2024!}
    depends_on:
      sqlserver:
        condition: service_healthy
      migrador:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - sgo_backend

  proveedores-service:
    build: ./backend1.0/proveedores-service
    container_name: proveedores_service_local
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD:-SgoAdmin2024!}
    depends_on:
      sqlserver:
        condition: service_healthy
      migrador:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - sgo_backend

  documentos-service:
    build: ./backend1.0/documentos-service
    container_name: documentos_service_local
    ports:
      - "8087:8087"
    volumes:
      - ./data/uploads:/app/uploads
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD:-SgoAdmin2024!}
      - MINIO_ENABLED=true
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=documentos
    depends_on:
      sqlserver:
        condition: service_healthy
      migrador:
        condition: service_completed_successfully
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - sgo_backend

  transacciones-service:
    build: ./backend1.0/transacciones-service
    container_name: transacciones_service_local
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD:-SgoAdmin2024!}
    depends_on:
      sqlserver:
        condition: service_healthy
      migrador:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - sgo_backend

  reportes-service:
    build: ./backend1.0/reportes-service
    container_name: reportes_service_local
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD:-SgoAdmin2024!}
      - SERVICIOS_OBRAS_BASE_URL=http://obras-service:8081
      - SERVICIOS_CLIENTES_BASE_URL=http://clientes-service:8082
      - SERVICIOS_PROVEEDORES_BASE_URL=http://proveedores-service:8083
      - SERVICIOS_TRANSACCIONES_BASE_URL=http://transacciones-service:8086
      - SERVICIOS_FACTURAS_BASE_URL=http://transacciones-service:8086
    depends_on:
      sqlserver:
        condition: service_healthy
      migrador:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - sgo_backend

  api-gateway:
    build:
      context: ./backend1.0/api-gateway
      dockerfile: Dockerfile
    container_name: api_gateway_service_local
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVICES_OBRAS_URL=http://obras-service:8081/api/obras
      - SERVICES_CLIENTES_URL=http://clientes-service:8082/api/clientes
      - SERVICES_PROVEEDORES_URL=http://proveedores-service:8083/api/proveedores
      - SERVICES_DOCUMENTOS_URL=http://documentos-service:8087/api/documentos
      - SERVICES_TRANSACCIONES_URL=http://transacciones-service:8086/api/transacciones
    depends_on:
      - obras-service
      - clientes-service
      - proveedores-service
      - documentos-service
      - transacciones-service
      - reportes-service
    restart: unless-stopped
    networks:
      - sgo_backend

  frontend:
    build: ./frontend1.2
    container_name: obras_frontend
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    restart: unless-stopped
    networks:
      - sgo_backend

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    restart: unless-stopped
    networks:
      - sgo_backend

networks:
  sgo_backend:
    driver: bridge

volumes:
  sqlserver_data:
  migration_flags:
