services:
  obras-service:
    build: ./backend1.0/obras-service
    container_name: obras_service
    ports:
      - "8081:8081"
    volumes:
      - obras_data:/app/data
      - ./data:/app/legacy:ro
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_prod;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.microsoft.sqlserver.jdbc.SQLServerDriver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
      - APP_MIGRATION_ENABLED=${APP_MIGRATION_ENABLED:-true}
      - APP_MIGRATION_SQLITE_URL=jdbc:sqlite:/app/legacy/obras.db
    restart: unless-stopped
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
    networks:
      - sgo_backend

  clientes-service:
    build: ./backend1.0/clientes-service
    container_name: clientes_service
    ports:
      - "8082:8082"
    volumes:
      - clientes_data:/app/data
      - ./data:/app/legacy:ro
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_prod;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.microsoft.sqlserver.jdbc.SQLServerDriver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
      - APP_MIGRATION_ENABLED=${APP_MIGRATION_ENABLED:-true}
      - APP_MIGRATION_SQLITE_URL=jdbc:sqlite:/app/legacy/clientes.db
    restart: unless-stopped
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
    networks:
      - sgo_backend

  proveedores-service:
    build: ./backend1.0/proveedores-service
    container_name: proveedores_service
    ports:
      - "8083:8083"
    volumes:
      - proveedores_data:/app/data
      - ./data:/app/legacy:ro
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_prod;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.microsoft.sqlserver.jdbc.SQLServerDriver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
      - APP_MIGRATION_ENABLED=${APP_MIGRATION_ENABLED:-true}
      - APP_MIGRATION_SQLITE_URL=jdbc:sqlite:/app/legacy/proveedores.db
    restart: unless-stopped
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
    networks:
      - sgo_backend

  documentos-service:
    build: ./backend1.0/documentos-service
    container_name: documentos_service
    ports:
      - "8087:8087"
    volumes:
      - documentos_data:/app/data
      - documentos_uploads:/app/uploads
      - ./data:/app/legacy:ro
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MINIO_ENABLED=true
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=documentos
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_prod;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.microsoft.sqlserver.jdbc.SQLServerDriver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
      - APP_MIGRATION_ENABLED=${APP_MIGRATION_ENABLED:-true}
      - APP_MIGRATION_SQLITE_URL=jdbc:sqlite:/app/legacy/documentos-dev.db
    depends_on:
      minio:
        condition: service_started
      sqlserver-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - sgo_backend

  transacciones-service:
    build: ./backend1.0/transacciones-service
    container_name: transacciones_service
    ports:
      - "8086:8086"
    volumes:
      - transacciones_data:/app/data
      - ./data:/app/legacy:ro
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_prod;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.microsoft.sqlserver.jdbc.SQLServerDriver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
      - APP_MIGRATION_ENABLED=${APP_MIGRATION_ENABLED:-true}
      - APP_MIGRATION_SQLITE_URL=jdbc:sqlite:/app/legacy/transacciones.db
    restart: unless-stopped
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
    networks:
      - sgo_backend

  reportes-service:
    build: ./backend1.0/reportes-service
    container_name: reportes_service
    ports:
      - "8084:8084"
    volumes:
      - reportes_data:/app/data
      - ./data:/app/legacy:ro
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_prod;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.microsoft.sqlserver.jdbc.SQLServerDriver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
      - APP_MIGRATION_ENABLED=${APP_MIGRATION_ENABLED:-true}
      - APP_MIGRATION_SQLITE_URL=jdbc:sqlite:/app/legacy/reportes.db
    restart: unless-stopped
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
    networks:
      - sgo_backend

  backup-service:
    build: ./backend1.0/backup-service
    container_name: backup_service
    ports:
      - "8088:8088"
    volumes:
      - backup_artifacts:/app/backups
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=sgo_prod;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.microsoft.sqlserver.jdbc.SQLServerDriver
      - SPRING_DATASOURCE_USERNAME=backups_app
      - SPRING_DATASOURCE_PASSWORD=BackupsApp_2026!
      - BACKUP_STORAGE_ROOT_DIR=/app/backups
    restart: unless-stopped
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
    networks:
      - sgo_backend

  api-gateway:
    build:
      context: ./backend1.0/api-gateway
      dockerfile: Dockerfile
    container_name: api_gateway_service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVICES_OBRAS_URL=http://obras-service:8081/api/v1/obras
      - SERVICES_CLIENTES_URL=http://clientes-service:8082/api/v1/clientes
      - SERVICES_PROVEEDORES_URL=http://proveedores-service:8083/api/v1/proveedores
      - SERVICES_DOCUMENTOS_URL=http://documentos-service:8087/api/v1/documentos
      - SERVICES_TRANSACCIONES_URL=http://transacciones-service:8086/api/v1/transacciones
      - SERVICES_BACKUPS_URL=http://backup-service:8088/api/v1/backups
    depends_on:
      - obras-service
      - clientes-service
      - proveedores-service
      - documentos-service
      - transacciones-service
      - reportes-service
      - backup-service
    restart: unless-stopped
    networks:
      - sgo_backend

  frontend:
    build: ./frontend1.2
    container_name: obras_frontend
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    restart: unless-stopped
    networks:
      - sgo_backend

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./tools/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./tools/observability/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
    ports:
      - "9090:9090"
    networks:
      - sgo_backend

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./tools/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./tools/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - sgo_backend

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
    volumes:
      - mssql_data:/var/opt/mssql
    restart: unless-stopped
    networks:
      - sgo_backend

  sqlserver-init:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: sqlserver_init
    environment:
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
    volumes:
      - ./db/init:/init:ro
    depends_on:
      - sqlserver
    entrypoint: /bin/bash -c "sleep 20 && /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P $${MSSQL_SA_PASSWORD} -i /init/create-databases.sql"
    restart: "no"
    networks:
      - sgo_backend

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    restart: unless-stopped
    networks:
      - sgo_backend

networks:
  sgo_backend:
    driver: bridge

volumes:
  obras_data:
  clientes_data:
  proveedores_data:
  documentos_data:
  documentos_uploads:
  transacciones_data:
  reportes_data:
  backup_artifacts:
  mssql_data:
  minio_data:
